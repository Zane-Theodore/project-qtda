<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }


  body, html {
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background-color: #f4f6f9; 
    overflow: hidden;
  }

  .app-layout {
    display: flex;
    height: 100vh;
    width: 100%;
  }
  /* ------------------------------------ */

  /* Sidebar */
  .layout-sidebar {
    width: 250px;
    background-color: #2F5597;
    color: white;
    display: flex;
    flex-direction: column; 
    flex-shrink: 0; 
  }

  .sidebar-fixed-top {
    padding: 20px;
    background-color: transparent;
    border-bottom: 1px solid #bdc3c7;
    flex-shrink: 0; 
  }

  .sidebar-scrollable-menu {
    flex-grow: 1;
    overflow-y: auto;
    padding: 15px 10px;
  }

  .sidebar-scrollable-menu .menu-btn {
    width: 100%;
    text-align: left;
    padding: 12px 15px;
    background: transparent;
    color: #ecf0f1;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    
    margin-bottom: 12px;
    
    transition: background-color 0.2s, padding-left 0.2s;
  }

  .sidebar-scrollable-menu .menu-btn:hover {
    background-color: #214073;
    padding-left: 20px; 
    color: #ffffff;
    font-weight: bold;
  }

  .sidebar-scrollable-menu::-webkit-scrollbar { width: 6px; }
  .sidebar-scrollable-menu::-webkit-scrollbar-track { background: transparent; }
  .sidebar-scrollable-menu::-webkit-scrollbar-thumb { background: #455a64; border-radius: 10px; }
  /* ------------------------------------ */

  /* Header + Main + Footer */
  .layout-right-column {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    background-color: #f4f6f9;
    overflow-y: auto;
  }

  /* Header */
  .layout-header {
    height: 100px;
    background-color: #2F5597;
    border-left: 1px solid #bdc3c7;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0; 
    position: sticky; 
    top: 0;
    z-index: 10;
    color: #ffffff;
  }

  .header-right-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-icon-btn {
    background: transparent;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    width: 50px;
    height: 50px;
    border-radius: 50%; 
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s;
  }

  .header-icon-btn:hover {
    background-color: rgba(255, 255, 255, 0.15);
  }

  .header-avatar {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background-color: #ecf0f1;
    color: #2F5597;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-left: 10px;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
  }

  .layout-main {
    flex-grow: 1;
    padding: 20px;
  }

  .layout-footer {
    height: 40px;
    background-color: #2F5597; 
    color: #ffffff; 
    border-top: 1px solid rgba(255,255,255,0.2);
    border-left: 1px solid #bdc3c7;
    
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  /* ------------------------------------ */

  /* Hiệu ứng loading */
  .loading-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    min-height: 300px;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #e0e0e0;
    border-top: 5px solid #3498db;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  /* ------------------------------------ */

  /* Toast Notification */
  #toast-container {
    position: fixed;
    top: 75px;
    right: 30px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 15px;
    pointer-events: none;
  }

  .toast-notification {
    box-sizing: border-box;
    pointer-events: auto;
    padding: 15px 25px;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    font-family: sans-serif;
    font-weight: bold;
    min-width: 250px;
    
    transform: translateX(150%); 
    animation: slideIn 0.5s forwards, fadeOut 0.5s 2.5s forwards; 
  }

  .toast-exit {
    animation: slideOutAndCollapse 0.4s ease-in-out forwards !important; 
  }

  @keyframes slideOutAndCollapse {
    0% { 
      transform: translateX(0); 
      opacity: 1; 
      max-height: 150px; 
      padding-top: 15px; 
      padding-bottom: 15px; 
      margin-bottom: 0;
    }
    50% { 
      transform: translateX(120%);
      opacity: 0;
      max-height: 150px; 
      padding-top: 15px; 
      padding-bottom: 15px; 
      margin-bottom: 0;
    }
    100% { 
      transform: translateX(120%); 
      opacity: 0; 
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0; 
      margin-bottom: -15px;
      overflow: hidden; 
      border: none;
    }
  }

  @keyframes slideIn {
    0% { transform: translateX(150%); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: translateX(150%); }
  }
</style>
