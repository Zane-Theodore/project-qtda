<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }


  body, html {
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background-color: #f4f6f9; 
    overflow: hidden;
  }

  .app-layout {
    display: flex;
    height: 100vh;
    width: 100%;
  }
  /* ------------------------------------ */

  /* Sidebar */
  .layout-sidebar {
    width: 250px;
    background-color: #2F5597;
    color: white;
    display: flex;
    flex-direction: column; 
    flex-shrink: 0; 
  }

  .sidebar-fixed-top {
    padding: 20px;
    background-color: transparent;
    border-bottom: 1px solid #bdc3c7;
    flex-shrink: 0; 
  }

  .sidebar-scrollable-menu {
    flex-grow: 1;
    overflow-y: auto;
    padding: 15px 10px;
  }

  .sidebar-scrollable-menu .menu-btn {
    width: 100%;
    text-align: left;
    padding: 12px 15px;
    background: transparent;
    color: #ecf0f1;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    
    margin-bottom: 12px;
    
    transition: background-color 0.2s, padding-left 0.2s;
  }

  .sidebar-scrollable-menu .menu-btn:hover {
    background-color: #214073;
    padding-left: 20px; 
    color: #ffffff;
    font-weight: bold;
  }

  .sidebar-scrollable-menu::-webkit-scrollbar { width: 6px; }
  .sidebar-scrollable-menu::-webkit-scrollbar-track { background: transparent; }
  .sidebar-scrollable-menu::-webkit-scrollbar-thumb { background: #455a64; border-radius: 10px; }
  /* ------------------------------------ */

  /* Header + Main + Footer */
  .layout-right-column {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    background-color: #f4f6f9;
    overflow-y: auto;
  }

  /* Header */
  .layout-header {
    height: 80px;
    background-color: #2F5597;
    border-left: 1px solid #bdc3c7;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
    display: flex;
    flex-direction: row; 
    flex-wrap: nowrap;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    flex-shrink: 0; 
    color: #ffffff;
    position: sticky; 
    top: 0;
    z-index: 10;
  }

  .header-container {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    height: 100%;
    gap: 20px;
  }

  .header-title {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex: 1;
    display: flex;
    align-items: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .header-right-group {
    display: flex;
    align-items: center;
    gap: 15px;
    flex-shrink: 0;
  }

  .header-icon-btn {
    background: transparent;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    width: 45px;
    height: 45px;
    border-radius: 50%; 
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s;
  }

  .header-icon-btn:hover {
    background-color: rgba(255, 255, 255, 0.15);
  }

  .header-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background-color: #ecf0f1;
    color: #2F5597;
    font-weight: bold;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
    transition: background-color 0.2s;
  }

  .header-avatar:hover {
    background-color: #d5dbdb;
  }

  .layout-main {
    flex-grow: 1;
    padding: 20px;
  }

  .layout-footer {
    height: 40px;
    background-color: #2F5597; 
    color: #ffffff; 
    border-top: 1px solid rgba(255,255,255,0.2);
    border-left: 1px solid #bdc3c7;
    
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  /* ------------------------------------ */

  /* Hiệu ứng loading */
  .loading-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    min-height: 300px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 5px solid #e0e0e0;
    border-top: 4px solid #2F5597;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  /* ------------------------------------ */

  /* Toast Notification */
  #toast-container {
    position: fixed;
    top: 75px;
    right: 30px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 15px;
    pointer-events: none;
  }

  .toast-notification {
    box-sizing: border-box;
    pointer-events: auto;
    padding: 15px 25px;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    font-family: sans-serif;
    font-weight: bold;
    min-width: 250px;
    
    transform: translateX(150%); 
    animation: slideIn 0.5s forwards, fadeOut 0.5s 2.5s forwards; 
  }

  .toast-exit {
    animation: slideOutAndCollapse 0.4s ease-in-out forwards !important; 
  }

  @keyframes slideOutAndCollapse {
    0% { 
      transform: translateX(0); 
      opacity: 1; 
      max-height: 150px; 
      padding-top: 15px; 
      padding-bottom: 15px; 
      margin-bottom: 0;
    }
    50% { 
      transform: translateX(120%);
      opacity: 0;
      max-height: 150px; 
      padding-top: 15px; 
      padding-bottom: 15px; 
      margin-bottom: 0;
    }
    100% { 
      transform: translateX(120%); 
      opacity: 0; 
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0; 
      margin-bottom: -15px;
      overflow: hidden; 
      border: none;
    }
  }

  @keyframes slideIn {
    0% { transform: translateX(150%); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: translateX(150%); }
  }
  /* ------------------------------------ */

  /* Login page */
  .login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh; /* Chiếm toàn bộ chiều cao màn hình */
    background-color: #f4f6f9; /* Màu nền xám nhạt */
  }

  .login-card {
    background: #ffffff;
    width: 100%;
    max-width: 400px;
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  }

  .login-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .login-header h2 {
    color: #2F5597;
    margin: 15px 0 5px 0;
    font-size: 22px;
    font-weight: bold;
  }

  .login-header p {
    color: #7f8c8d;
    font-size: 14px;
    margin: 0;
  }

  .input-group {
    margin-bottom: 20px;
  }

  .input-group label {
    display: block;
    font-size: 13px;
    font-weight: bold;
    color: #34495e;
    margin-bottom: 8px;
  }

  .input-with-icon {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-with-icon .icon {
    position: absolute;
    left: 12px;
    color: #95a5a6;
    font-size: 20px;
  }

  .input-with-icon input {
    width: 100%;
    padding: 12px 12px 12px 40px; /* Chừa 40px bên trái cho Icon */
    border: 1px solid #bdc3c7;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    transition: all 0.2s ease;
  }

  .input-with-icon input:focus {
    border-color: #2F5597;
    box-shadow: 0 0 0 3px rgba(47, 85, 151, 0.1);
  }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background-color: #2F5597;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    transition: background-color 0.2s;
    margin-top: 10px;
  }

  .btn-submit:hover {
    background-color: #1a3c73;
  }

  .btn-submit:disabled {
    background-color: #95a5a6;
    cursor: not-allowed;
  }
</style>
