<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body, html {
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background-color: #f4f6f9; 
    overflow: hidden;
  }
  /* ------------------------------------ */

  /* Loading animation */
  .loading-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    min-height: 300px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 5px solid #e0e0e0;
    border-top: 4px solid #2F5597;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  /* ------------------------------------ */

  /* Loading Spinner for Buttons */
  .btn-spinner {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top: 3px solid #ffffff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: inline-block;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  /* ------------------------------------ */

  /* Toast Notification */
  #toast-container {
    position: fixed;
    top: 75px;
    right: 30px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 15px;
    pointer-events: none;
  }

  .toast-notification {
    box-sizing: border-box;
    pointer-events: auto;
    padding: 15px 25px;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    font-family: sans-serif;
    font-weight: bold;
    min-width: 250px;
    
    transform: translateX(150%); 
    animation: slideIn 0.5s forwards, fadeOut 0.5s 2.5s forwards; 
  }

  .toast-exit {
    animation: slideOutAndCollapse 0.4s ease-in-out forwards !important; 
  }

  @keyframes slideOutAndCollapse {
    0% { 
      transform: translateX(0); 
      opacity: 1; 
      max-height: 150px; 
      padding-top: 15px; 
      padding-bottom: 15px; 
      margin-bottom: 0;
    }
    50% { 
      transform: translateX(120%);
      opacity: 0;
      max-height: 150px; 
      padding-top: 15px; 
      padding-bottom: 15px; 
      margin-bottom: 0;
    }
    100% { 
      transform: translateX(120%); 
      opacity: 0; 
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0; 
      margin-bottom: -15px;
      overflow: hidden; 
      border: none;
    }
  }

  @keyframes slideIn {
    0% { transform: translateX(150%); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: translateX(150%); }
  }
  /* ------------------------------------ */
</style>
