<style>
  /* =========================================
     CSS ĐỘC QUYỀN CHO LECTURER PROFILE
     ========================================= */
  .profile-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #333;
  }

  /* Grid 2 cột cho Giảng viên */
  .lec-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 25px;
  }

  /* --- CÁC THẺ CARD CHUNG --- */
  .info-card {
    background: #fff;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    margin-bottom: 25px;
  }

  /* --- CỘT TRÁI: CARD CÁ NHÂN --- */
  .center-card {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .avatar-wrapper {
    margin-bottom: 15px;
  }

  .profile-avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background-color: #e8f0fe;
    color: #0F57D0;
    font-size: 50px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 4px solid #fff;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    line-height: 1;
    padding: 0;
  }

  .lec-name {
    font-size: 24px;
    color: #1e293b;
    margin: 10px 0 5px 0;
  }

  .lec-title {
    color: #0F57D0;
    font-weight: 600;
    font-size: 15px;
    margin: 0 0 15px 0;
  }

  .tag {
    background: #e0e7ff;
    color: #4338ca;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    display: inline-block;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: #f1f5f9;
    margin: 25px 0;
  }

  .lec-stat-row {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 15px;
    margin-bottom: 20px;
    text-align: left;
  }

  .lec-stat-row:last-child {
    margin-bottom: 0;
  }

  .stat-icon {
    background: #f8fafc;
    color: #0F57D0;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stat-label {
    display: block;
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    font-weight: bold;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }

  .stat-value {
    display: block;
    color: #1e293b;
    font-weight: 600;
    font-size: 15px;
  }

  /* --- CỘT TRÁI: CARD LIÊN HỆ --- */
  .card-heading {
    font-size: 15px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 0 0 25px 0;
  }

  .contact-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 25px;
  }

  .contact-row:last-child {
    margin-bottom: 0;
  }

  .contact-info .contact-label {
    display: block;
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    font-weight: bold;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
  }

  .contact-info .contact-value {
    display: block;
    color: #1e293b;
    font-weight: 600;
    font-size: 18px;
    line-height: 1.4;
  }

  .contact-icon {
    color: #475569;
    font-size: 24px;
    opacity: 0.8;
  }

  /* --- CỘT PHẢI: CHI TIẾT ĐÀO TẠO & THÀNH TỰU --- */
  .update-time {
    text-align: right;
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 20px;
  }

  .section-title {
    display: flex;
    align-items: center;
    font-size: 16px;
    font-weight: bold;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  .section-title::before {
    content: '';
    display: block;
    width: 5px;
    height: 20px;
    border-radius: 4px;
    margin-right: 12px;
  }

  .title-purple::before {
    background: #6366f1;
  }

  .title-blue::before {
    background: #3b82f6;
  }

  /* Lưới Hoạt động đào tạo (Pills) */
  .teaching-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 40px;
  }

  .teaching-item {
    background: #f8fafc;
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .teaching-item .material-symbols-outlined {
    color: #0F57D0;
    background: #e8f0fe;
    border-radius: 50%;
    padding: 2px;
    font-size: 20px;
  }

  .teaching-item .t-content {
    display: flex;
    flex-direction: column;
  }

  .teaching-item .t-title {
    color: #1e293b;
    font-weight: bold;
    font-size: 15px;
  }

  /* Timeline Thành tựu */
  .timeline-container {
    border-left: 2px solid #e2e8f0;
    margin-left: 10px;
    padding-left: 25px;
  }

  .timeline-item {
    position: relative;
    margin-bottom: 25px;
  }

  .timeline-item:last-child {
    margin-bottom: 0;
  }

  .timeline-item::before {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: #64748b;
    border-radius: 50%;
    left: -32px;
    top: 4px;
    border: 3px solid #fff;
    box-shadow: 0 0 0 1px #e2e8f0;
  }

  .timeline-item .t-year {
    color: #4338ca;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .timeline-item .t-detail {
    color: #1e293b;
    font-weight: 500;
    font-size: 15px;
  }

  /* --- LOADING --- */
  #profile-loading {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    min-height: 400px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .lec-grid {
      grid-template-columns: 1fr;
    }

    .teaching-grid {
      grid-template-columns: 1fr;
    }
  }

  /* =========================================
     CSS ĐỘC QUYỀN CHO LECTURER GRADING
     ========================================= */
  .grading-container {
    background: #f1f5f9;
    padding: 20px 30px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #333;
    min-height: calc(100vh - 60px);
  }

  .grading-header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 15px;
  }

  .grading-title .title-text {
    font-size: 24px;
    font-weight: 700;
    color: #1e3a8a;
    /* Dark blue */
    background: #e0e7ff;
    padding: 8px 24px;
    border-radius: 4px;
    clip-path: polygon(0 0, 90% 0, 100% 100%, 0% 100%);
    display: inline-block;
    padding-right: 40px;
  }

  .grading-actions {
    display: flex;
    gap: 15px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
  }

  .btn-outline-custom {
    background: #fff;
    border: 1px solid #cbd5e1;
    color: #475569;
  }

  .btn-outline-custom:hover {
    background: #f8fafc;
  }

  .btn-primary-custom {
    background: #2563eb;
    color: #fff;
    box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
  }

  .btn-primary-custom:hover {
    background: #1d4ed8;
  }

  /* Table styles */
  .grading-table-wrapper {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    margin-bottom: 30px;
    overflow-x: auto;
  }

  .grading-table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
  }

  .grading-table th {
    font-size: 11px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 16px 12px;
    border-bottom: 2px solid #f1f5f9;
  }

  .grading-table td {
    padding: 20px 12px;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
  }

  .grading-table tr:last-child td {
    border-bottom: none;
  }

  .student-name {
    font-weight: 700;
    color: #1e293b;
    font-size: 15px;
    display: block;
  }

  .student-mssv {
    font-size: 12px;
    color: #64748b;
    margin-top: 4px;
    display: block;
  }

  .thesis-title {
    font-size: 14px;
    color: #334155;
    line-height: 1.5;
  }

  .score-display {
    font-size: 16px;
    font-weight: 700;
    color: #0f172a;
  }

  .score-display.empty {
    color: #94a3b8;
  }

  /* Role tags */
  .role-tag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .tag-gvhd {
    background: #e0e7ff;
    color: #4f46e5;
  }

  .tag-gvpb {
    background: #f3e8ff;
    color: #9333ea;
  }

  .tag-tvhd {
    background: #475569;
    color: #f8fafc;
  }

  /* Actions */
  .action-btn {
    background: transparent;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .action-btn:hover {
    background: #f1f5f9;
    color: #3b82f6;
  }

  /* Legend Cards */
  .role-legend-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .legend-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    align-items: flex-start;
    gap: 15px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
  }

  .legend-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .legend-icon .material-symbols-outlined {
    font-size: 20px;
  }

  .role-gvhd {
    background: #e0e7ff;
    color: #4f46e5;
  }

  .role-gvpb {
    background: #f3e8ff;
    color: #9333ea;
  }

  .role-tvhd {
    background: #f1f5f9;
    color: #475569;
  }

  .legend-info h4 {
    margin: 0 0 6px 0;
    font-size: 14px;
    font-weight: 700;
    color: #1e293b;
  }

  .legend-info p {
    margin: 0;
    font-size: 12px;
    color: #64748b;
    line-height: 1.5;
  }

  /* =========================================
     MODAL STYLES
     ========================================= */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(15, 23, 42, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .grading-modal-box {
    background: #fff;
    width: 100%;
    max-width: 600px;
    border-radius: 16px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    transform: translateY(20px);
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
  }

  .modal-overlay.show .grading-modal-box {
    transform: translateY(0);
  }

  .modal-header {
    padding: 24px 30px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-title {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: #1e3a8a;
  }

  .btn-close-modal {
    background: transparent;
    border: none;
    color: #64748b;
    cursor: pointer;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .btn-close-modal:hover {
    background: #f1f5f9;
    color: #0f172a;
  }

  .modal-body {
    padding: 30px;
  }

  .thesis-info-section {
    margin-bottom: 25px;
  }

  .field-label {
    font-size: 11px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .thesis-title-text {
    font-size: 18px;
    font-weight: 700;
    color: #1e3a8a;
    line-height: 1.4;
  }

  .grading-row {
    display: flex;
    gap: 20px;
    margin-bottom: 25px;
  }

  .grading-col {
    flex: 1;
  }

  /* File Attachment component */
  .file-attachment-box {
    background: #f8fafc;
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .file-icon-wrapper {
    background: #fee2e2;
    color: #ef4444;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .file-details {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .file-name {
    font-size: 14px;
    font-weight: 600;
    color: #0f172a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-size {
    font-size: 12px;
    color: #64748b;
    margin-top: 2px;
  }

  .btn-view-file {
    background: #fff;
    border: 1px solid #e2e8f0;
    color: #1e3a8a;
    font-weight: 600;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
  }

  .btn-view-file:hover {
    background: #f1f5f9;
  }

  /* Score Input component */
  .score-input-wrapper {
    background: #f8fafc;
    border-radius: 12px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
  }

  .score-input {
    background: transparent;
    border: none;
    font-size: 32px;
    font-weight: 700;
    color: #475569;
    width: 100%;
    text-align: center;
    outline: none;
  }

  /* Dynamic Area */
  .dynamic-role-section {
    margin-top: 15px;
  }

  /* Turnitin Upload */
  .upload-area {
    border: 2px dashed #cbd5e1;
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    background: #fff;
    cursor: pointer;
    transition: all 0.2s;
  }

  .upload-area:hover {
    border-color: #3b82f6;
    background: #f8fafc;
  }

  .upload-icon {
    background: #e0e7ff;
    color: #3b82f6;
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 15px;
  }

  .upload-title {
    font-size: 14px;
    font-weight: 600;
    color: #0f172a;
    margin-bottom: 4px;
  }

  .upload-subtitle {
    font-size: 12px;
    color: #64748b;
  }

  /* GVPB / TVHĐ Textarea */
  .feedback-textarea {
    width: 100%;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 16px;
    font-family: inherit;
    font-size: 14px;
    color: #334155;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }

  .feedback-textarea:focus {
    border-color: #3b82f6;
    background: #fff;
  }

  .modal-footer {
    padding: 20px 30px;
    border-top: 1px solid #e2e8f0;
    background: #f8fafc;
    border-bottom-left-radius: 16px;
    border-bottom-right-radius: 16px;
    display: flex;
    justify-content: flex-end;
  }
</style>
