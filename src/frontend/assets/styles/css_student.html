<style>
  /* Student Profile Styles */

  .profile-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #333;
  }

  /* --- HEADER CARD --- */
  .profile-container .profile-header-card {
    background: #fff;
    border-radius: 20px;
    padding: 25px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    margin-bottom: 25px;
  }

  .profile-container .header-left {
    display: flex;
    align-items: center;
    gap: 25px;
  }

  /* Vòng tròn Avatar */
  .profile-container .profile-avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background-color: #e8f0fe;
    color: #0F57D0;
    font-size: 36px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 3px solid #0F57D0;
    box-shadow: 0 4px 10px rgba(47, 85, 151, 0.15);
    line-height: 1;
    padding: 0;
  }

  .profile-container .header-info .tag {
    background: #e8f0fe;
    color: #0F57D0;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    display: inline-block;
    margin-bottom: 8px;
  }

  .profile-container .header-info h1 {
    margin: 0 0 5px 0;
    font-size: 26px;
    color: #1a202c;
  }

  .profile-container .header-info p {
    margin: 0;
    color: #718096;
    font-size: 15px;
  }

  .profile-container .btn-update {
    background: #0F57D0;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }

  .profile-container .btn-update:hover {
    background: #1a3c73;
  }

  /* --- GRID --- */
  .profile-container .profile-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
  }

  /* Card thông tin chung */
  .profile-container .info-card {
    background: #fff;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
  }

  .profile-container .card-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    color: #1a202c;
    margin-bottom: 25px;
    font-weight: bold;
  }

  .profile-container .card-title .material-symbols-outlined {
    background: #e8f0fe;
    color: #0F57D0;
    padding: 8px;
    border-radius: 10px;
  }

  /* Từng dòng dữ liệu */
  .profile-container .info-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #edf2f7;
    font-size: 14px;
  }

  .profile-container .info-row:last-child {
    border-bottom: none;
  }

  .profile-container .info-label {
    color: #718096;
    font-weight: 500;
  }

  .profile-container .info-value {
    color: #2d3748;
    font-weight: 600;
    text-align: right;
    max-width: 80%;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }

  /* --- CỘT 3: HERO CARD GPA & THỰC TẬP --- */
  .profile-container .gpa-hero-card {
    background: #0F57D0;
    border-radius: 20px;
    padding: 30px 25px;
    color: white;
    margin-bottom: 25px;
    box-shadow: 0 10px 20px rgba(47, 85, 151, 0.2);
  }

  .profile-container .gpa-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.9;
    margin-bottom: 10px;
  }

  .profile-container .gpa-score {
    font-size: 48px;
    font-weight: bold;
    margin: 0;
  }

  .profile-container .gpa-max {
    font-size: 20px;
    opacity: 0.8;
  }

  .profile-container .intern-card {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
  }

  .profile-container .intern-info h4 {
    margin: 0 0 5px 0;
    color: #1a202c;
    font-size: 15px;
  }

  .profile-container .intern-info p {
    margin: 0;
    color: #718096;
    font-size: 13px;
  }

  .profile-container .intern-score {
    background: #e8f5e9;
    color: #2e7d32;
    padding: 6px 12px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 16px;
  }

  /* --- LOADING STATE --- */
  #profile-loading {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    min-height: 300px;
  }

  @media (max-width: 900px) {
    .profile-grid {
      grid-template-columns: 1fr;
    }

    .profile-header-card {
      flex-direction: column;
      text-align: center;
      gap: 20px;
    }

    .header-left {
      flex-direction: column;
    }

    .info-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
    }

    .info-value {
      text-align: left;
    }
  }
</style>
