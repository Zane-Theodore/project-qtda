<script>
// Global state for council assignment
window.CouncilState = {
  allLecturers: [],
  allCouncils: [],
  currentMode: 'create', // 'create' or 'edit'
  currentCouncilId: null,
  selectedMembers: {
    president: null,
    secretary: null,
    members: [],
    reviewers: []
  }
};

/**
 * Init function - called by router when view loads
 */
window.initHodCouncilAssignment = function() {
  console.log("Initializing HOD Council Assignment...");
  loadHodCouncils();
  loadAvailableLecturers();
};

/**
 * Load all councils from backend
 */
function loadHodCouncils() {
  google.script.run
    .withSuccessHandler(function(responseStr) {
      const response = JSON.parse(responseStr);
      if (response.success) {
        window.CouncilState.allCouncils = response.data;
        renderCouncilsTable(response.data);
        console.log("Loaded " + response.data.length + " councils");
      } else {
        showHodCouncilError("Lỗi tải danh sách hội đồng: " + response.error);
      }
    })
    .withFailureHandler(function(error) {
      showHodCouncilError("Lỗi kết nối: " + error.message);
      console.error("Error loading councils:", error);
    })
    .api_hod_getAllCouncils();
}

/**
 * Load available lecturers
 */
function loadAvailableLecturers() {
  google.script.run
    .withSuccessHandler(function(responseStr) {
      const response = JSON.parse(responseStr);
      if (response.success) {
        window.CouncilState.allLecturers = response.data;
        console.log("Loaded " + response.data.length + " available lecturers");
      } else {
        console.error("Error loading lecturers:", response.error);
      }
    })
    .api_hod_getAvailableLecturers();
}

/**
 * Render councils table
 */
function renderCouncilsTable(councils) {
  const tbody = document.getElementById('council-table-body');
  const loading = document.getElementById('council-loading');
  const content = document.getElementById('council-content');

  if (!tbody) return;

  const html = councils.map((council, idx) => {
    const president = council.members?.find(m => m.position === 'Chủ tịch hội đồng');
    const secretary = council.members?.find(m => m.position === 'Thư ký hội đồng');
    const presidentName = president?.fullName || '--';
    const secretaryName = secretary?.fullName || '--';

    const memberCount = council.members?.length || 0;
    const statusClass = council.isGradeLocked ? 'status-ready' : 'status-draft';
    const statusText = council.isGradeLocked ? 'Sẵn sàng' : 'Bản nháp';

    return `
      <tr onclick="openEditCouncilModal('${council.id}')">
        <td class="stt-col">${String(idx + 1).padStart(2, '0')}</td>
        <td><a class="council-name-link">${council.councilName}</a></td>
        <td>
          <div class="member-role-stack">
            <span class="member-name-primary">${presidentName}</span>
            <span class="member-name-secondary">${secretaryName} (TK)</span>
          </div>
        </td>
        <td style="text-align: center;">
          <span class="badge-counter">${String(memberCount).padStart(2, '0')}</span>
        </td>
        <td>${formatCouncilDate(council.createdAt || '')}</td>
        <td><span class="badge-premium-status ${statusClass}">${statusText}</span></td>
      </tr>
    `;
  }).join('');

  tbody.innerHTML = html || '<tr><td colspan="6" style="text-align: center; padding: 30px; color: #999;">Chưa có hội đồng nào</td></tr>';

  if (loading) loading.style.display = 'none';
  if (content) content.style.display = 'block';
}

/**
 * Format date for display
 */
function formatCouncilDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return isNaN(d.getTime()) ? dateStr : d.toLocaleDateString('vi-VN');
  } catch (e) {
    return dateStr;
  }
}

/**
 * Open create council modal
 */
window.openCreateCouncilModal = function() {
  window.CouncilState.currentMode = 'create';
  window.CouncilState.currentCouncilId = null;
  resetCouncilForm();
  populateCouncilSelects(window.CouncilState.allLecturers);
  document.getElementById('council-modal').style.display = 'flex';
  document.getElementById('council-modal-title').textContent = 'Thiết lập Hội đồng bảo vệ';
  document.getElementById('btn-save-draft').style.display = 'inline-block';
  document.getElementById('btn-submit-council').textContent = 'Tạo';
  document.getElementById('status-group').style.display = 'none';
};

/**
 * Open edit council modal
 */
window.openEditCouncilModal = function(councilId) {
  const council = window.CouncilState.allCouncils.find(c => c.id === councilId);
  if (!council) {
    alert('Không tìm thấy hội đồng');
    return;
  }

  window.CouncilState.currentMode = 'edit';
  window.CouncilState.currentCouncilId = councilId;

  // For edit mode, load lecturers that are available + already in this council
  google.script.run
    .withSuccessHandler(function(responseStr) {
      const response = JSON.parse(responseStr);
      if (response.success) {
        populateCouncilSelects(response.data);
        loadCouncilMembersIntoForm(council);
        document.getElementById('input-council-name').value = council.councilName || '';
      } else {
        showHodCouncilError(response.error);
      }
    })
    .api_hod_getAvailableLecturersForEdit(councilId);

  document.getElementById('council-modal').style.display = 'flex';
  document.getElementById('council-modal-title').textContent = 'Chỉnh sửa Hội đồng';
  document.getElementById('btn-save-draft').style.display = 'none';
  document.getElementById('btn-submit-council').textContent = 'Lưu thay đổi';
  document.getElementById('status-group').style.display = 'block';
  document.getElementById('select-council-status').value = council.isGradeLocked ? "true" : "false";
};

/**
 * Populate all dropdown selects with lecturers
 */
function populateCouncilSelects(lecturers) {
  const selectIds = ['president', 'secretary', 'member', 'reviewer'];
  selectIds.forEach(type => {
    const select = document.getElementById('select-' + type);
    if (!select) return;
    select.innerHTML = '<option value="">Chọn giảng viên...</option>' +
      lecturers.map(l => `<option value="${l.id}">${l.fullName}</option>`).join('');
  });
}

/**
 * Load council members into form
 */
function loadCouncilMembersIntoForm(council) {
  resetCouncilForm();

  if (!council.members) return;

  const president = council.members.find(m => m.position === 'Chủ tịch hội đồng');
  const secretary = council.members.find(m => m.position === 'Thư ký hội đồng');
  const members = council.members.filter(m => m.position === 'Thành viên hội đồng');
  const reviewers = council.members.filter(m => m.position === 'Giảng viên phản biện');

  if (president) {
    const presSelect = document.getElementById('select-president');
    if (presSelect) presSelect.value = president.lecturerId;
    window.CouncilState.selectedMembers.president = president.lecturerId;
  }

  if (secretary) {
    const secSelect = document.getElementById('select-secretary');
    if (secSelect) secSelect.value = secretary.lecturerId;
    window.CouncilState.selectedMembers.secretary = secretary.lecturerId;
  }

  members.forEach(m => {
    window.CouncilState.selectedMembers.members.push(m);
  });

  reviewers.forEach(r => {
    window.CouncilState.selectedMembers.reviewers.push(r);
  });

  renderCouncilMembersList();
  renderCouncilReviewersList();
  updateCouncilMemberCount();
}

/**
 * Add member to form
 */
window.addCouncilMember = function() {
  const select = document.getElementById('select-member');
  if (!select) return;

  const lecturerId = select.value;
  if (!lecturerId) {
    showHodCouncilFormError('Vui lòng chọn thành viên');
    return;
  }

  // Check for duplicate
  if (window.CouncilState.selectedMembers.members.find(m => m.lecturerId === lecturerId)) {
    showHodCouncilFormError('Thành viên này đã được thêm');
    return;
  }

  // Check if already used as president/secretary/reviewer
  if (lecturerId === window.CouncilState.selectedMembers.president) {
    showHodCouncilFormError('Giáo viên này đã là Chủ tịch');
    return;
  }
  if (lecturerId === window.CouncilState.selectedMembers.secretary) {
    showHodCouncilFormError('Giáo viên này đã là Thư ký');
    return;
  }
  if (window.CouncilState.selectedMembers.reviewers.find(r => r.lecturerId === lecturerId)) {
    showHodCouncilFormError('Giáo viên này đã là Phản biện');
    return;
  }

  const selectedText = select.options[select.selectedIndex].text;
  window.CouncilState.selectedMembers.members.push({
    lecturerId,
    fullName: selectedText
  });

  renderCouncilMembersList();
  updateCouncilMemberCount();
  select.value = '';
};

/**
 * Add reviewer to form
 */
window.addCouncilReviewer = function() {
  const select = document.getElementById('select-reviewer');
  if (!select) return;

  const lecturerId = select.value;
  if (!lecturerId) {
    showHodCouncilFormError('Vui lòng chọn phản biện');
    return;
  }

  // Check for duplicate
  if (window.CouncilState.selectedMembers.reviewers.find(r => r.lecturerId === lecturerId)) {
    showHodCouncilFormError('Phản biện này đã được thêm');
    return;
  }

  // Check if already used in other positions
  if (lecturerId === window.CouncilState.selectedMembers.president) {
    showHodCouncilFormError('Giáo viên này đã là Chủ tịch');
    return;
  }
  if (lecturerId === window.CouncilState.selectedMembers.secretary) {
    showHodCouncilFormError('Giáo viên này đã là Thư ký');
    return;
  }
  if (window.CouncilState.selectedMembers.members.find(m => m.lecturerId === lecturerId)) {
    showHodCouncilFormError('Giáo viên này đã là Thành viên');
    return;
  }

  const selectedText = select.options[select.selectedIndex].text;
  window.CouncilState.selectedMembers.reviewers.push({
    lecturerId,
    fullName: selectedText
  });

  renderCouncilReviewersList();
  updateCouncilMemberCount();
  select.value = '';
};

/**
 * Render members list
 */
function renderCouncilMembersList() {
  const container = document.getElementById('members-list');
  if (!container) return;

  container.innerHTML = window.CouncilState.selectedMembers.members.map(m =>
    `<div class="council-member-tag">${m.fullName}<span class="remove" onclick="removeCouncilMember('${m.lecturerId}')">✕</span></div>`
  ).join('');
}

/**
 * Render reviewers list
 */
function renderCouncilReviewersList() {
  const container = document.getElementById('reviewers-list');
  if (!container) return;

  container.innerHTML = window.CouncilState.selectedMembers.reviewers.map(r =>
    `<div class="council-member-tag">${r.fullName}<span class="remove" onclick="removeCouncilReviewer('${r.lecturerId}')">✕</span></div>`
  ).join('');
}

/**
 * Remove member
 */
window.removeCouncilMember = function(lecturerId) {
  window.CouncilState.selectedMembers.members =
    window.CouncilState.selectedMembers.members.filter(m => m.lecturerId !== lecturerId);
  renderCouncilMembersList();
  updateCouncilMemberCount();
};

/**
 * Remove reviewer
 */
window.removeCouncilReviewer = function(lecturerId) {
  window.CouncilState.selectedMembers.reviewers =
    window.CouncilState.selectedMembers.reviewers.filter(r => r.lecturerId !== lecturerId);
  renderCouncilReviewersList();
  updateCouncilMemberCount();
};

/**
 * Update member count display
 */
function updateCouncilMemberCount() {
  const hasPresident = !!document.getElementById('select-president').value;
  const total = (hasPresident ? 1 : 0) + 
                window.CouncilState.selectedMembers.members.length +
                window.CouncilState.selectedMembers.reviewers.length;

  const infoDiv = document.getElementById('member-count-info');
  const countSpan = document.getElementById('member-count-value');

  if (infoDiv && countSpan) {
    countSpan.textContent = total;
    infoDiv.style.display = total > 0 ? 'block' : 'none';
  }
}

/**
 * Save council (create or update)
 */
window.saveCouncil = function() {
  const councilName = document.getElementById('input-council-name').value.trim();
  const presidentId = document.getElementById('select-president').value;
  const secretaryId = document.getElementById('select-secretary').value;

  // Validate
  if (!councilName) {
    showHodCouncilFormError('Tên hội đồng không được để trống');
    return;
  }
  if (!presidentId) {
    showHodCouncilFormError('Chủ tịch hội đồng là bắt buộc');
    return;
  }
  if (!secretaryId) {
    showHodCouncilFormError('Thư ký hội đồng là bắt buộc');
    return;
  }
  if (presidentId === secretaryId) {
    showHodCouncilFormError('Chủ tịch và Thư ký phải là hai người khác nhau');
    return;
  }

  const totalMembers = (presidentId ? 1 : 0) + 
                       window.CouncilState.selectedMembers.members.length +
                       window.CouncilState.selectedMembers.reviewers.length;

  if (totalMembers % 2 === 0) {
    showHodCouncilFormError(`Số lượng thành viên phải là số lẻ (hiện tại: ${totalMembers})`);
    return;
  }

  const councilData = {
    councilName,
    presidentId,
    secretaryId,
    memberIds: window.CouncilState.selectedMembers.members.map(m => m.lecturerId),
    reviewerIds: window.CouncilState.selectedMembers.reviewers.map(r => r.lecturerId),
    isGradeLocked: document.getElementById('select-council-status').value === "true"
  };

  const submitBtn = event.target;
  submitBtn.disabled = true;

  if (window.CouncilState.currentMode === 'create') {
    google.script.run
      .withSuccessHandler(handleSaveCouncilSuccess)
      .withFailureHandler(handleSaveCouncilError)
      .api_hod_createCouncil(councilData);
  } else {
    google.script.run
      .withSuccessHandler(handleSaveCouncilSuccess)
      .withFailureHandler(handleSaveCouncilError)
      .api_hod_updateCouncil(window.CouncilState.currentCouncilId, councilData);
  }

  setTimeout(() => submitBtn.disabled = false, 2000);
};

/**
 * Handle save success
 */
function handleSaveCouncilSuccess(result) {
  try {
    const response = JSON.parse(result);
    if (response.success) {
      showNotification('Cập nhật hội đồng thành công', 'success');
      closeCouncilModal();
      loadHodCouncils();
    } else {
      showHodCouncilFormError(response.error || 'Lỗi không xác định');
    }
  } catch (e) {
    showHodCouncilFormError('Lỗi xử lý phản hồi từ server');
    console.error('Parse error:', e);
  }
}

/**
 * Handle save error
 */
function handleSaveCouncilError(error) {
  showHodCouncilFormError('Lỗi kết nối: ' + error.message);
  console.error('Save error:', error);
}

/**
 * Close modal
 */
window.closeCouncilModal = function() {
  document.getElementById('council-modal').style.display = 'none';
  resetCouncilForm();
};

/**
 * Close modal on backdrop click
 */
window.closeCouncilModalOnBackdrop = function(event) {
  if (event.target.id === 'council-modal') {
    closeCouncilModal();
  }
};

/**
 * Save draft council to database (isGradeLocked = false)
 */
window.saveDraftToLocalStorage = function() {
  const councilName = document.getElementById('input-council-name').value.trim();

  // Validate
  if (!councilName) {
    showHodCouncilFormError('Tên hội đồng không được để trống');
    return;
  }

  const submitBtn = event.target;
  submitBtn.disabled = true;

  google.script.run
    .withSuccessHandler(function(result) {
      try {
        const response = JSON.parse(result);
        if (response.success) {
          showNotification('Lưu hội đồng nháp thành công', 'success');
          closeCouncilModal();
          loadHodCouncils();
        } else {
          showHodCouncilFormError(response.error || 'Lỗi không xác định');
        }
      } catch (e) {
        showHodCouncilFormError('Lỗi xử lý phản hồi');
      }
      submitBtn.disabled = false;
    })
    .withFailureHandler(function(error) {
      showHodCouncilFormError('Lỗi kết nối: ' + error.message);
      submitBtn.disabled = false;
    })
    .api_hod_saveDraftCouncil(councilName);
};

/**
 * Reset form
 */
function resetCouncilForm() {
  document.getElementById('input-council-name').value = '';
  document.getElementById('select-president').value = '';
  document.getElementById('select-secretary').value = '';
  document.getElementById('select-member').value = '';
  document.getElementById('select-reviewer').value = '';

  window.CouncilState.selectedMembers = {
    president: null,
    secretary: null,
    members: [],
    reviewers: []
  };

  document.getElementById('members-list').innerHTML = '';
  document.getElementById('reviewers-list').innerHTML = '';

  const errorDiv = document.getElementById('council-modal-error');
  if (errorDiv) errorDiv.style.display = 'none';

  const infoDiv = document.getElementById('member-count-info');
  if (infoDiv) infoDiv.style.display = 'none';
}

/**
 * Show form error in modal
 */
function showHodCouncilFormError(message) {
  const errorDiv = document.getElementById('council-modal-error');
  if (errorDiv) {
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
  }
}

/**
 * Show general error (outside form)
 */
function showHodCouncilError(message) {
  const content = document.getElementById('council-content');
  if (content) {
    content.innerHTML = `<div style="padding: 40px; text-align: center; color: #d32f2f;">${message}</div>`;
  }
}

/**
 * Switch between tabs
 */
window.switchHodCouncilTab = function(tabName) {
  document.querySelectorAll('.council-tab-content').forEach(el => {
    el.style.display = 'none';
  });
  document.querySelectorAll('.premium-tab').forEach(el => {
    el.classList.remove('active');
  });

  const tab = document.getElementById(tabName);
  
  // Find button that triggers this tab
  const buttons = document.querySelectorAll('.premium-tab');
  buttons.forEach(btn => {
    if (btn.getAttribute('onclick').includes(tabName)) {
      btn.classList.add('active');
    }
  });

  if (tab) tab.style.display = 'block';
};
// ====== DEFENSE ROOM LOGIC ======
window.DefenseRoomState = {
  allRooms: [],
  eligibleTheses: [],
  selectedThesisIds: new Set()
};

function loadDefenseRooms() {
  const tbody = document.getElementById('defense-room-table-body');
  if (tbody) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px;">Đang tải dữ liệu...</td></tr>';
  }

  google.script.run
    .withSuccessHandler(function(responseStr) {
      if (!document.getElementById('defense-room-table-body')) return;
      const response = JSON.parse(responseStr);
      if (response.success) {
        window.DefenseRoomState.allRooms = response.data;
        renderDefenseRooms();
      } else {
        document.getElementById('defense-room-table-body').innerHTML = 
          `<tr><td colspan="6" style="text-align:center; color:red; padding:20px;">Lỗi: ${response.error}</td></tr>`;
      }
    })
    .withFailureHandler(function(error) {
      if (!document.getElementById('defense-room-table-body')) return;
      document.getElementById('defense-room-table-body').innerHTML = 
        `<tr><td colspan="6" style="text-align:center; color:red; padding:20px;">Lỗi kết nối: ${error.message}</td></tr>`;
    })
    .api_hod_getAllDefenseRooms();
}

function renderDefenseRooms() {
  const tbody = document.getElementById('defense-room-table-body');
  if (!tbody) return;

  if (!window.DefenseRoomState.allRooms || window.DefenseRoomState.allRooms.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px; color:#999;">Chưa có phòng hội đồng nào</td></tr>';
    return;
  }

  function formatScheduleTime(ts) {
    if (!ts) return { date: '', time: '' };
    // Check if it's an ISO string (contains T and Z)
    if (ts.includes('T') && ts.includes('Z')) {
      const d = new Date(ts);
      if (!isNaN(d.getTime())) {
        const dateStr = [
          d.getDate().toString().padStart(2, '0'),
          (d.getMonth() + 1).toString().padStart(2, '0'),
          d.getFullYear()
        ].join('/');
        let hh = d.getHours();
        const mm = d.getMinutes().toString().padStart(2, '0');
        const ampm = hh >= 12 ? 'PM' : 'AM';
        hh = hh % 12;
        if (hh === 0) hh = 12;
        const timeStr = `${hh.toString().padStart(2, '0')}:${mm} ${ampm}`;
        return { date: dateStr, time: timeStr };
      }
    }
    // Otherwise assume it's our "DD/MM/YYYY HH:MM" format or similar space-separated string
    const parts = ts.split(' ');
    return {
      date: parts[0] || '',
      time: parts.slice(1).join(' ') || ''
    };
  }

  let html = '';
  window.DefenseRoomState.allRooms.forEach((room, index) => {
    const formattedDate = formatScheduleTime(room.scheduleTime);
    
    html += `
      <tr onclick="openEditDefenseRoomModal('${room.councilId}')">
        <td class="stt-col" style="text-align:center;">${(index + 1).toString().padStart(2, '0')}</td>
        <td>
          <a class="council-name-link">${room.councilName}</a>
        </td>
        <td>
          <div class="member-role-stack">
            <span class="member-name-primary">${room.presidentName || 'Chưa phân công'}</span>
            <span class="member-name-secondary">${room.secretaryName || 'Chưa phân công'} (TK)</span>
          </div>
        </td>
        <td>${room.roomName}</td>
        <td>
          <div style="font-weight: bold; color: #1e293b; font-size: 14px;">${formattedDate.date}</div>
          <div style="font-size: 13px; color: #888; font-weight: 500;">${formattedDate.time}</div>
        </td>
        <td style="text-align:center;">
          <span class="badge-counter">
            ${(room.studentCount || 0).toString().padStart(2, '0')}
          </span>
        </td>
      </tr>
    `;
  });

  tbody.innerHTML = html;
}

window.openDefenseRoomModal = function() {
  document.getElementById('room-modal').style.display = 'flex';
  document.getElementById('room-modal-title').textContent = 'Thêm Phòng hội đồng mới';
  document.getElementById('btn-submit-room').textContent = 'Thêm phòng mới';
  
  document.getElementById('input-room-name').value = '';
  document.getElementById('input-room-date').value = '';
  document.getElementById('input-room-time').value = '';
  document.getElementById('room-student-list').innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Vui lòng chọn Hội đồng trước</div>';
  window.DefenseRoomState.selectedThesisIds.clear();

  const select = document.getElementById('select-room-council');
  if (select) {
    select.disabled = false;
    let options = '<option value="">Chọn hội đồng</option>';
    if (window.CouncilState.allCouncils) {
      window.CouncilState.allCouncils.forEach(c => {
        options += `<option value="${c.id}">${c.councilName}</option>`;
      });
    }
    select.innerHTML = options;
  }
};

window.openEditDefenseRoomModal = function(councilId) {
  const room = window.DefenseRoomState.allRooms.find(r => r.councilId === councilId);
  if (!room) return;
  
  document.getElementById('room-modal').style.display = 'flex';
  document.getElementById('room-modal-title').textContent = 'Chỉnh sửa Phòng hội đồng';
  document.getElementById('btn-submit-room').textContent = 'Lưu thay đổi';
  
  document.getElementById('input-room-name').value = room.roomName || '';
  
  let defaultDate = '';
  let defaultTime = '';
  if (room.scheduleTime) {
    // If it's an ISO string from Google Sheets
    if (room.scheduleTime.includes('T') && room.scheduleTime.includes('Z')) {
      const d = new Date(room.scheduleTime);
      if (!isNaN(d.getTime())) {
        defaultDate = `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')}`;
        defaultTime = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
      }
    } else {
      // parse "17/05/2026 08:30" => date format YYYY-MM-DD
      const parts = room.scheduleTime.split(' ');
      const dateParts = parts[0].split('/'); // DD/MM/YYYY
      if (dateParts.length === 3) {
        defaultDate = `${dateParts[2]}-${dateParts[1].padStart(2,'0')}-${dateParts[0].padStart(2,'0')}`;
      }
      if (parts.length > 1) {
        defaultTime = parts[1] || '';
      }
    }
  }

  document.getElementById('input-room-date').value = defaultDate;
  document.getElementById('input-room-time').value = defaultTime;

  window.DefenseRoomState.selectedThesisIds.clear();

  const select = document.getElementById('select-room-council');
  if (select) {
    select.disabled = true; // disable changing council when editing
    let options = `<option value="${room.councilId}">${room.councilName}</option>`;
    select.innerHTML = options;
    window.onRoomCouncilChanged(); // load eligible students
  }
};

window.closeDefenseRoomModal = function() {
  document.getElementById('room-modal').style.display = 'none';
};

window.closeRoomModalOnBackdrop = function(e) {
  if (e.target.id === 'room-modal') {
    closeDefenseRoomModal();
  }
};

window.onRoomCouncilChanged = function() {
  const councilId = document.getElementById('select-room-council').value;
  const listContainer = document.getElementById('room-student-list');
  
  if (!councilId) {
    listContainer.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Vui lòng chọn Hội đồng trước</div>';
    return;
  }

  listContainer.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">Đang tải danh sách sinh viên khả dụng...</div>';
  window.DefenseRoomState.selectedThesisIds.clear();

  google.script.run
    .withSuccessHandler(function(resStr) {
      const res = JSON.parse(resStr);
      if (res.success) {
        window.DefenseRoomState.eligibleTheses = res.data;
        res.data.forEach(t => {
          if (t.isSelected) window.DefenseRoomState.selectedThesisIds.add(t.thesisId);
        });
        renderRoomEligibleStudents();
      } else {
        listContainer.innerHTML = `<div style="text-align: center; color: red; padding: 20px;">Lỗi: ${res.error}</div>`;
      }
    })
    .withFailureHandler(function(err) {
      listContainer.innerHTML = `<div style="text-align: center; color: red; padding: 20px;">Lỗi kết nối: ${err.message}</div>`;
    })
    .api_hod_getEligibleTheses(councilId);
};

function renderRoomEligibleStudents() {
  const listContainer = document.getElementById('room-student-list');
  let html = '';

  if (!window.DefenseRoomState.eligibleTheses || window.DefenseRoomState.eligibleTheses.length === 0) {
    listContainer.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Không có đề tài nào đủ điều kiện</div>';
    return;
  }

  window.DefenseRoomState.eligibleTheses.forEach(t => {
    const isSelected = window.DefenseRoomState.selectedThesisIds.has(t.thesisId);
    const btnClass = isSelected ? 'btn-danger' : 'btn-light';
    const btnText = isSelected ? 'Bỏ chọn' : 'Chọn';
    const initials = t.studentName.split(' ').map(n=>n[0]).join('').substring(0, 2).toUpperCase() || 'SV';
    
    html += `
      <div class="room-student-item">
        <div class="room-student-avatar">${initials}</div>
        <div class="room-student-info">
          <div class="room-student-name">${t.studentName}</div>
          <div class="room-student-sub">${t.studentCode}</div>
          <div class="room-student-title" style="margin-top:2px;">${t.title}</div>
        </div>
        <button class="btn ${btnClass} btn-sm" onclick="toggleRoomStudent('${t.thesisId}')">${btnText}</button>
      </div>
    `;
  });

  listContainer.innerHTML = html;
}

window.toggleRoomStudent = function(thesisId) {
  if (window.DefenseRoomState.selectedThesisIds.has(thesisId)) {
    window.DefenseRoomState.selectedThesisIds.delete(thesisId);
  } else {
    window.DefenseRoomState.selectedThesisIds.add(thesisId);
  }
  renderRoomEligibleStudents();
};

window.saveDefenseRoom = function() {
  const roomName = document.getElementById('input-room-name').value;
  const councilId = document.getElementById('select-room-council').value;
  const date = document.getElementById('input-room-date').value;
  const time = document.getElementById('input-room-time').value;

  if (!councilId || !roomName || !date || !time) {
    alert('Vui lòng điền đầy đủ thông tin (Phòng, Hội đồng, Ngày, Giờ)');
    return;
  }

  const parts = date.split('-');
  const formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;

  const data = {
    councilId: councilId,
    roomName: roomName,
    date: formattedDate,
    time: time,
    selectedThesisIds: Array.from(window.DefenseRoomState.selectedThesisIds)
  };

  const btn = document.getElementById('btn-submit-room');
  const orgText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Đang lưu...';

  google.script.run
    .withSuccessHandler(function(resStr) {
      btn.disabled = false;
      btn.textContent = orgText;
      const res = JSON.parse(resStr);
      if (res.success) {
        showNotification(res.message || 'Cập nhật phòng hội đồng thành công', 'success');
        closeDefenseRoomModal();
        loadDefenseRooms();
      } else {
        alert(res.error);
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.textContent = orgText;
      alert('Lỗi kết nối: ' + err.message);
    })
    .api_hod_saveDefenseRoom(data);
};

// Override tab switch to load defense rooms
const orgSwitchTab = window.switchHodCouncilTab;
window.switchHodCouncilTab = function(tabName) {
  orgSwitchTab(tabName);
  if (tabName === 'phan-cong-phong-hoi-dong') {
    loadDefenseRooms();
  } else if (tabName === 'danh-sach-hoi-dong') {
    loadHodCouncils();
  }
};
// ====== END DEFENSE ROOM LOGIC ======
</script>
