<script>
  /**
   * Xử lý quá trình đăng nhập của người dùng từ giao diện Frontend.
   * @param {Event} event - Sự kiện submit của form đăng nhập.
   */
  function handleLogin(event) {
    event.preventDefault();

    const emailInput = document.getElementById('login-email').value.trim();
    const passInput = document.getElementById('login-password').value.trim();
    const btnSubmit = document.getElementById('btnLogin');

    const emailError = document.getElementById('email-error');
    const passError = document.getElementById('password-error');
    const elEmailInput = document.getElementById('login-email');
    const elPassInput = document.getElementById('login-password');

    let isValid = true;

    if (emailInput === '') {
      emailError.textContent = 'Vui lòng nhập tài khoản email của bạn!';
      emailError.style.display = 'block';
      elEmailInput.classList.add('input-error-border');
      isValid = false;
    }

    if (passInput === '') {
      passError.textContent = 'Vui lòng nhập mật khẩu!';
      passError.style.display = 'block';
      elPassInput.classList.add('input-error-border');
      isValid = false;
    }

    if (!isValid) {
      return;
    }

    emailError.style.display = 'none';
    passError.style.display = 'none';
    elEmailInput.classList.remove('input-error-border');
    elPassInput.classList.remove('input-error-border');

    btnSubmit.innerHTML = '<div class="btn-spinner"></div>';
    btnSubmit.disabled = true;

    const accountData = {
      email: emailInput,
      password: passInput
    };

    google.script.run
      .withSuccessHandler(function (response) {

        btnSubmit.innerHTML = 'ĐĂNG NHẬP';
        btnSubmit.disabled = false;

        if (response.success) {
          const sidebar = document.querySelector('.layout-sidebar');
          const header = document.querySelector('.layout-header');
          const appContent = document.getElementById('app-content');

          if (sidebar) sidebar.style.display = '';
          if (header) header.style.display = '';
          if (appContent) appContent.style.width = '100%';

          window.currentUserData = response.userData || {};
          window.currentUserData.role = (window.currentUserData.role || '').toString().toUpperCase();

          console.log('Login successful - role:', window.currentUserData.role, '| positions:', window.currentUserData.positions);

          if (typeof safeSetText === 'function') {
            safeSetText('side-user-name', window.currentUserData.fullName);
            safeSetText('side-user-email', window.currentUserData.email);

            // Cập nhật ở Dropdown Header luôn (nếu có)
            safeSetText('dropdown-user-name', window.currentUserData.fullName);
            safeSetText('dropdown-user-email', window.currentUserData.email);
          }

          if (typeof updateAvatarFromName === 'function') {
            updateAvatarFromName(window.currentUserData.fullName, 'profile-avatar-text');
            updateAvatarFromName(window.currentUserData.fullName, 'avatarText'); // Cho Dropdown Avatar
          }

          // Cập nhật tooltip (tiêu đề khi trỏ chuột vào avatar)
          const avatarBtn = document.getElementById('userAvatarBtn');
          if (avatarBtn) {
            avatarBtn.title = response.userData.fullName + ' (' + response.userData.email + ')';
          }

          loadMenuByRole(response.userData.role);

          if (appContent) appContent.innerHTML = '';

          const role = window.currentUserData.role;

          // Chỉ kiểm tra LECTURER và HOD
          if (['LECTURER', 'HOD'].includes(role)) {
            navigate('frontend/views/lecturer/view_lecturer_profile', 'initLecturerProfile');
          } else {
            navigate('frontend/views/student/view_student_profile', 'initStudentProfile');
          }

        } else {
          alert(response.message);

          document.getElementById('login-password').value = '';
          document.getElementById('login-password').focus();
        }
      })
      .withFailureHandler(function (error) {
        btnSubmit.innerHTML = 'ĐĂNG NHẬP';
        btnSubmit.disabled = false;
        alert("Lỗi kết nối đến máy chủ. Vui lòng thử lại!");
      })
      .verifyLogin(accountData);
  }

  /**
   * Hàm xử lý tính năng Ẩn/Hiện mật khẩu (Toggle Password Visibility).
   */
  function togglePasswordVisibility() {
    const passInput = document.getElementById('login-password');
    const toggleIcon = document.querySelector('.toggle-password');

    if (passInput.type === 'password') {
      passInput.type = 'text';
      toggleIcon.textContent = 'visibility';
    } else {
      passInput.type = 'password';
      toggleIcon.textContent = 'visibility_off';
    }
  }

  /**
   * Xử lý quá trình đăng xuất khỏi hệ thống.
   * Sử dụng Confirmation Modal (Async/Await).
   */
  async function handleLogout() {
    if (typeof showConfirmationModal === 'function') {
      const result = await showConfirmationModal(
        'Xác nhận đăng xuất',
        'Bạn có chắc chắn muốn đăng xuất?',
        { confirmText: 'Đăng xuất' }
      );
      if (!result) return;
    } else {
      if (!confirm("Bạn có chắc muốn đăng xuất?")) return;
    }

    window.currentUserData = null;

    const sidebar = document.querySelector('.layout-sidebar');
    const header = document.querySelector('.layout-header');
    const appContent = document.getElementById('app-content');

    // Đóng dropdown nếu đang mở
    const dropdown = document.getElementById('userDropdown');
    if (dropdown) dropdown.classList.add('hidden');

    if (sidebar) sidebar.style.display = 'none';
    if (header) header.style.display = 'none';
    if (appContent) appContent.innerHTML = '';

    navigate('frontend/views/auth/view_login');
  }

  /**
   * Bộ bảo vệ trạng thái ban đầu (Auth Guard - Initializer).
   * Mặc định khóa toàn bộ Layout và ép hiển thị giao diện Login.
   */
  function initializePage() {
    const sidebar = document.querySelector('.layout-sidebar');
    const header = document.querySelector('.layout-header');
    const appContent = document.getElementById('app-content');

    if (sidebar) sidebar.style.display = 'none';
    if (header) header.style.display = 'none';
    if (appContent) appContent.innerHTML = '';

    navigate('frontend/views/auth/view_login');
  }

  window.addEventListener('load', initializePage);

  function updateActiveMenu(actionId) {
    const buttons = document.querySelectorAll('#lecturer-menu-list .menu-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    const activeBtn = document.getElementById('menu-btn-' + actionId);
    if (activeBtn) activeBtn.classList.add('active');
  }

  /**
   * Render menu cho lecturer bằng cách gộp tất cả quyền từ mảng positions
   */
  function renderLecturerMenu() {
    const menuList = document.getElementById('lecturer-menu-list');
    if (!menuList) return;

    const role = window.currentUserData?.role;
    const positions = window.currentUserData?.positions || []; // Mảng positions

    console.log('✅ Rendering menu for Role:', role, '| Positions:', positions);

    let combinedMenuItems = [];

    // Hàm phụ trợ đẩy item vào mảng (nếu chưa bị trùng ID)
    const addMenuItems = (key) => {
      const items = window.LecturerRoleMenu[key];
      if (items) {
        items.forEach(newItem => {
          if (!combinedMenuItems.find(existingItem => existingItem.id === newItem.id)) {
            combinedMenuItems.push(newItem);
          }
        });
      }
    };

    // Nạp Menu theo Role & Positions
    if (role === 'HOD') addMenuItems('hod');

    if (positions.includes('chairman')) addMenuItems('chairman');
    if (positions.includes('secretary')) addMenuItems('secretary');

    // Cả supervisor và reviewer đều dùng menu council_member
    // Chúng được phân biệt qua supervisorId/reviewerId trong bảng Thesis
    if (positions.includes('supervisor') || positions.includes('reviewer')) {
      addMenuItems('council_member');
    }

    // Menu cơ bản cho lecturer (nếu không có position đặc biệt)
    if (role === 'LECTURER' && combinedMenuItems.length === 0) {
      addMenuItems('lecturer');
    }

    // Mặc định an toàn
    if (combinedMenuItems.length === 0) {
      addMenuItems('default');
    }

    window._renderedLecturerMenuItems = combinedMenuItems;

    menuList.innerHTML = combinedMenuItems.map(item => `
      <li>
        <button id="menu-btn-${item.id}" class="menu-btn" onclick="handleLecturerAction('${item.id}')">
          <span class="material-symbols-outlined">${item.icon}</span>
          <span>${item.label}</span>
        </button>
      </li>
    `).join('');
  }

  /**
   * Xử lý các action của lecturer menu bằng cách quét toàn bộ cấu hình
   */
  function handleLecturerAction(actionId) {
    console.log('📌 Action triggered:', actionId);

    let foundAction = null;
    if (window._renderedLecturerMenuItems) {
      const item = window._renderedLecturerMenuItems.find(m => m.id === actionId);
      if (item && item.action) {
        foundAction = item.action;
      }
    }

    if (foundAction) {
      updateActiveMenu(actionId);
      foundAction();
    } else {
      console.warn('❌ Action not found for id:', actionId);
    }
  }

  /**
   * Tải và nhúng động (inject) các nút Menu vào Sidebar dựa trên chức vụ.
   * @param {string} role - Chức vụ của người dùng (VD: 'LECTURER', 'STUDENT').
   */
  function loadMenuByRole(role) {
    const menuContainer = document.getElementById('sidebar-menu-container');
    if (!menuContainer) return;

    const normalizedRole = (role || '').toString().toUpperCase();
    let fileName = '';

    // Chỉ cần check 2 role
    if (['LECTURER', 'HOD'].includes(normalizedRole)) {
      fileName = 'frontend/components/sidebars/sidebar_lecturer';
    } else {
      fileName = 'frontend/components/sidebars/sidebar_student';
    }

    if (window.ViewCache && window.ViewCache[fileName]) {
      const fragment = document.createDocumentFragment();
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = window.ViewCache[fileName];

      // Execute scripts in the loaded HTML
      const scripts = tempDiv.querySelectorAll('script');
      scripts.forEach(script => {
        if (script.textContent) {
          try {
            eval(script.textContent);
            console.log('✅ Script executed successfully');
          } catch (e) {
            console.error('❌ Error executing script:', e);
          }
        }
      });

      while (tempDiv.firstChild) {
        fragment.appendChild(tempDiv.firstChild);
      }

      menuContainer.innerHTML = '';
      menuContainer.appendChild(fragment);

      // Render lecturer menu
      if (['LECTURER', 'HOD'].includes(normalizedRole) && window.currentUserData) {
        setTimeout(() => {
          if (typeof window.LecturerRoleMenu !== 'undefined') {
            renderLecturerMenu();
          } else {
            console.error('❌ LecturerRoleMenu is not defined');
          }
        }, 100);
      }
      return;
    }

    menuContainer.innerHTML = `
      <div class="loading-container" style="min-height: 100px;">
        <div class="spinner"></div>
      </div>
    `;

    google.script.run
      .withSuccessHandler(function (htmlContent) {
        window.ViewCache[fileName] = htmlContent;

        const fragment = document.createDocumentFragment();
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;

        // Execute scripts in the loaded HTML
        const scripts = tempDiv.querySelectorAll('script');
        scripts.forEach(script => {
          if (script.textContent) {
            try {
              eval(script.textContent);
              console.log('✅ Script executed successfully from server');
            } catch (e) {
              console.error('❌ Error executing script from server:', e);
            }
          }
        });

        while (tempDiv.firstChild) {
          fragment.appendChild(tempDiv.firstChild);
        }

        menuContainer.innerHTML = '';
        menuContainer.appendChild(fragment);

        // Render lecturer menu
        if (['LECTURER', 'HOD'].includes(normalizedRole) && window.currentUserData) {
          setTimeout(() => {
            if (typeof window.LecturerRoleMenu !== 'undefined') {
              renderLecturerMenu();
            } else {
              console.error('❌ LecturerRoleMenu is not defined from server load');
            }
          }, 100);
        }
      })
      .withFailureHandler(function (error) {
        menuContainer.innerHTML = '<div style="color: #e74c3c; text-align: center; padding: 20px;">Lỗi kết nối máy chủ!</div>';
      })
      .api_loadView(fileName);
  }
</script>
