<script>
  /**
   * Xử lý sự kiện đăng nhập
   */
  function handleLogin(event) {
    event.preventDefault(); // Chặn việc tải lại trang

    // 1. Lấy dữ liệu từ ô nhập
    const emailInput = document.getElementById('login-email').value.trim();
    const passInput = document.getElementById('login-password').value.trim();
    const btnSubmit = document.getElementById('btnLogin');

    // 2. Hiển thị trạng thái đang tải (Loading)
    btnSubmit.innerHTML = '<span class="material-symbols-outlined" style="animation: spin 1s linear infinite;">autorenew</span> Đang xử lý...';
    btnSubmit.disabled = true;

    // Đóng gói dữ liệu thành Object khớp với hàm Backend
    const accountData = {
      email: emailInput,
      password: passInput
    };

    // 3. Gửi lên Backend
    google.script.run
      .withSuccessHandler(function(response) {
        // Khôi phục nút bấm
        btnSubmit.innerHTML = 'ĐĂNG NHẬP';
        btnSubmit.disabled = false;

        if (response.success) {
          // Hiển thị giao diện chính (sidebar, header, footer)
          const sidebar = document.querySelector('.layout-sidebar');
          const header = document.querySelector('.layout-header');
          const footer = document.querySelector('.layout-footer');
          const appContent = document.getElementById('app-content');

          if(sidebar) sidebar.style.display = '';
          if(header) header.style.display = '';
          if(footer) footer.style.display = '';
          if(appContent) appContent.style.width = '100%';
          
          // Lưu userData tạm thời trong memory (không lưu trên storage)
          window.currentUserData = response.userData;
          
          // Cập nhật avatar với chữ cái đầu của tên người dùng
          const avatarText = document.getElementById('avatarText');
          const avatarBtn = document.getElementById('userAvatarBtn');
          if(avatarText) {
            avatarText.textContent = response.userData.name.charAt(0).toUpperCase();
          }
          if(avatarBtn) {
            avatarBtn.title = response.userData.name + ' (' + response.userData.email + ')';
          }
          
          // Xóa nội dung cũ (login form) trước khi load view mới
          if(appContent) appContent.innerHTML = '';
          
          // Điều hướng đến trang phù hơp tùy theo role (CHỈ LOAD VIEW, không load layout)
          if (response.userData.role === 'LECTURE') {
            navigate('frontend/views/lecturer/view_lecturer');
          } else if (response.userData.role === 'STUDENT') {
            navigate('frontend/views/student/view_student');
          } else {
            // Nếu role khác, mặc định hiển thị student view
            navigate('frontend/views/student/view_student');
          }

        } else {
          // Hiển thị lỗi từ Backend
          alert(response.message);
          
          // Xóa trắng ô mật khẩu cho người dùng nhập lại
          document.getElementById('login-password').value = '';
          document.getElementById('login-password').focus();
        }
      })
      .withFailureHandler(function(error) {
        btnSubmit.innerHTML = 'ĐĂNG NHẬP';
        btnSubmit.disabled = false;
        alert("Lỗi kết nối đến máy chủ. Vui lòng thử lại!");
      })
      .verifyLogin(accountData);
  }

  /**
   * Xử lý đăng xuất
   */
  function handleLogout() {
    if (!confirm("Bạn có chắc muốn đăng xuất?")) {
      return;
    }

    // Xóa dữ liệu người dùng
    window.currentUserData = null;
    
    // Ẩn giao diện chính
    const sidebar = document.querySelector('.layout-sidebar');
    const header = document.querySelector('.layout-header');
    const footer = document.querySelector('.layout-footer');
    const appContent = document.getElementById('app-content');

    if(sidebar) sidebar.style.display = 'none';
    if(header) header.style.display = 'none';
    if(footer) footer.style.display = 'none';
    if(appContent) appContent.innerHTML = '';
    
    // Xóa nội dung và tải lại trang login
    navigate('frontend/views/auth/view_login');
  }

  /**
   * Khởi tạo trang - luôn hiển thị login
   */
  function initializePage() {
    const sidebar = document.querySelector('.layout-sidebar');
    const header = document.querySelector('.layout-header');
    const footer = document.querySelector('.layout-footer');
    const appContent = document.getElementById('app-content');

    // Ẩn giao diện chính ban đầu
    if(sidebar) sidebar.style.display = 'none';
    if(header) header.style.display = 'none';
    if(footer) footer.style.display = 'none';
    if(appContent) appContent.innerHTML = '';
    
    // Hiển thị trang login
    navigate('frontend/views/auth/view_login');
  }

  // Chạy khởi tạo ngay khi load trang
  window.addEventListener('load', initializePage);
</script>
