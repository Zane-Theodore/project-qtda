<script>
  /**
   * Xử lý quá trình đăng nhập của người dùng từ giao diện Frontend.
   * @param {Event} event - Sự kiện submit của form đăng nhập.
   */
  function handleLogin(event) {
    event.preventDefault();

    const emailInput = document.getElementById('login-email').value.trim();
    const passInput = document.getElementById('login-password').value.trim();
    const btnSubmit = document.getElementById('btnLogin');

    const emailError = document.getElementById('email-error');
    const passError = document.getElementById('password-error');
    const elEmailInput = document.getElementById('login-email');
    const elPassInput = document.getElementById('login-password');

    let isValid = true;

    if (emailInput === '') {
      emailError.textContent = 'Vui lòng nhập tài khoản email của bạn!';
      emailError.style.display = 'block';
      elEmailInput.classList.add('input-error-border');
      isValid = false;
    }

    if (passInput === '') {
      passError.textContent = 'Vui lòng nhập mật khẩu!';
      passError.style.display = 'block';
      elPassInput.classList.add('input-error-border');
      isValid = false;
    }

    if (!isValid) {
      return; 
    }

    emailError.style.display = 'none';
    passError.style.display = 'none';
    elEmailInput.classList.remove('input-error-border');
    elPassInput.classList.remove('input-error-border');

    btnSubmit.innerHTML = '<div class="btn-spinner"></div>';
    btnSubmit.disabled = true;

    const accountData = {
      email: emailInput,
      password: passInput
    };

    google.script.run
      .withSuccessHandler(function(response) {

        btnSubmit.innerHTML = 'ĐĂNG NHẬP';
        btnSubmit.disabled = false;

        if (response.success) {
          const sidebar = document.querySelector('.layout-sidebar');
          const header = document.querySelector('.layout-header');
          const appContent = document.getElementById('app-content');

          if(sidebar) sidebar.style.display = '';
          if(header) header.style.display = '';
          if(appContent) appContent.style.width = '100%';

          window.currentUserData = response.userData || {};
          window.currentUserData.role = (window.currentUserData.role || '').toString().toUpperCase();
          window.currentUserData.position = (window.currentUserData.position || '').toString().toLowerCase();

          console.log('Login successful - role:', window.currentUserData.role, ', position:', window.currentUserData.position);

          safeSetText('side-user-name', window.currentUserData.fullName);
          safeSetText('side-user-email', window.currentUserData.email);

          // Hiển thị position nếu là lecturer
          if (window.currentUserData.role === 'LECTURER' && window.currentUserData.position) {
            const positionLabels = {
              'gvhd': 'Giảng viên hướng dẫn',
              'tbm': 'Trưởng bộ môn',
              'gvpb': 'Giảng viên phản biện',
              'tkhd': 'Thư ký hội đồng',
              'tvhd': 'Thành viên hội đồng',
              'cthd': 'Chủ tịch hội đồng'
            };
            const positionText = positionLabels[window.currentUserData.position] || window.currentUserData.position;
            const positionEl = document.getElementById('side-user-position');
            if (positionEl) {
              positionEl.textContent = positionText;
              positionEl.style.display = 'block';
            }
          }

          updateAvatarFromName(window.currentUserData.fullName, 'profile-avatar-text');

          // Cập nhật tooltip (tiêu đề khi trỏ chuột vào avatar)
          const avatarBtn = document.getElementById('userAvatarBtn');
          if(avatarBtn) {
            avatarBtn.title = response.userData.fullName + ' (' + response.userData.email + ')';
          }

          loadMenuByRole(response.userData.role);
          
          if(appContent) appContent.innerHTML = '';
          
          if (window.currentUserData.role === 'LECTURER') {
            navigate('frontend/views/lecturer/view_lecturer_profile', 'initLecturerProfile');
          } else {
            navigate('frontend/views/student/view_student_profile', 'initStudentProfile');
          }

        } else {
          alert(response.message);
          
          document.getElementById('login-password').value = '';
          document.getElementById('login-password').focus();
        }
      })
      .withFailureHandler(function(error) {
        btnSubmit.innerHTML = 'ĐĂNG NHẬP';
        btnSubmit.disabled = false;
        alert("Lỗi kết nối đến máy chủ. Vui lòng thử lại!");
      })
      .verifyLogin(accountData);
  }

  /**
   * Hàm xử lý tính năng Ẩn/Hiện mật khẩu (Toggle Password Visibility).
   */
  function togglePasswordVisibility() {
    const passInput = document.getElementById('login-password');
    const toggleIcon = document.querySelector('.toggle-password');

    if (passInput.type === 'password') {
      passInput.type = 'text';
      toggleIcon.textContent = 'visibility';
    } else {
      passInput.type = 'password';
      toggleIcon.textContent = 'visibility_off';
    }
  }

  /**
   * Xử lý quá trình đăng xuất khỏi hệ thống.
   */
  function handleLogout() {
    if (!confirm("Bạn có chắc muốn đăng xuất?")) {
      return;
    }

    window.currentUserData = null;

    const sidebar = document.querySelector('.layout-sidebar');
    const header = document.querySelector('.layout-header');
    const appContent = document.getElementById('app-content');

    if(sidebar) sidebar.style.display = 'none';
    if(header) header.style.display = 'none';
    if(appContent) appContent.innerHTML = '';
    
    navigate('frontend/views/auth/view_login');
  }

  /**
   * Bộ bảo vệ trạng thái ban đầu (Auth Guard - Initializer).
   * Mặc định khóa toàn bộ Layout và ép hiển thị giao diện Login.
   */
  function initializePage() {
    const sidebar = document.querySelector('.layout-sidebar');
    const header = document.querySelector('.layout-header');
    const appContent = document.getElementById('app-content');

    if(sidebar) sidebar.style.display = 'none';
    if(header) header.style.display = 'none';
    if(appContent) appContent.innerHTML = '';

    navigate('frontend/views/auth/view_login');
  }

  window.addEventListener('load', initializePage);



  /**
   * Render menu cho lecturer dựa vào vị trí (position)
   */
  function renderLecturerMenu(position) {
    const menuList = document.getElementById('lecturer-menu-list');
    if (!menuList) {
      console.warn('❌ Menu list element not found for lecturer');
      return;
    }

    const normalizedPosition = (position || '').toString().toLowerCase();
    const menuItems = window.LecturerPositionMenu[normalizedPosition] || window.LecturerPositionMenu.default;
    console.log('✅ Rendering menu for position:', normalizedPosition, 'with', menuItems.length, 'items');
    
    menuList.innerHTML = menuItems.map(item => `
      <li>
        <button class="menu-btn" onclick="handleLecturerAction('${item.id}')">
          <span class="material-symbols-outlined">${item.icon}</span>
          <span>${item.label}</span>
        </button>
      </li>
    `).join('');
  }

  /**
   * Xử lý các action của lecturer menu
   */
  function handleLecturerAction(actionId) {
    const position = (window.currentUserData?.position || 'default').toString().toLowerCase();
    const menuItem = window.LecturerPositionMenu[position]?.find(m => m.id === actionId);
    
    console.log('📌 Action clicked:', actionId, 'for position:', position);
    
    if (menuItem && menuItem.action) {
      menuItem.action();
    } else {
      console.warn('❌ Action not found:', actionId, 'for position:', position);
    }
  }

  /**
   * Tải và nhúng động (inject) các nút Menu vào Sidebar dựa trên chức vụ.
   * @param {string} role - Chức vụ của người dùng (VD: 'LECTURER', 'STUDENT').
   */
  function loadMenuByRole(role) {
    const menuContainer = document.getElementById('sidebar-menu-container');
    if (!menuContainer) return;

    const normalizedRole = (role || '').toString().toUpperCase();
    let fileName = '';
    if (normalizedRole === 'LECTURER') {
      fileName = 'frontend/components/sidebars/sidebar_lecturer';
    } else {
      fileName = 'frontend/components/sidebars/sidebar_student';
    }

    if (window.ViewCache && window.ViewCache[fileName]) {
      const fragment = document.createDocumentFragment();
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = window.ViewCache[fileName];

      // Execute scripts in the loaded HTML
      const scripts = tempDiv.querySelectorAll('script');
      scripts.forEach(script => {
        if (script.textContent) {
          try {
            eval(script.textContent);
            console.log('✅ Script executed successfully');
          } catch (e) {
            console.error('❌ Error executing script:', e);
          }
        }
      });

      while (tempDiv.firstChild) {
        fragment.appendChild(tempDiv.firstChild);
      }
      
      menuContainer.innerHTML = '';
      menuContainer.appendChild(fragment);
      
      // Render lecturer menu dựa vào position
      if (normalizedRole === 'LECTURER' && window.currentUserData) {
        setTimeout(() => {
          const position = (window.currentUserData.position || 'default').toString().toLowerCase();
          console.log('🔍 Checking LecturerPositionMenu availability:', typeof window.LecturerPositionMenu, 'position:', position);
          if (typeof window.LecturerPositionMenu !== 'undefined') {
            renderLecturerMenu(position);
          } else {
            console.error('❌ LecturerPositionMenu is not defined');
          }
        }, 100);
      }
      return; 
    }

    menuContainer.innerHTML = `
      <div class="loading-container" style="min-height: 100px;">
        <div class="spinner"></div>
      </div>
    `;

    google.script.run
      .withSuccessHandler(function(htmlContent) {
        window.ViewCache[fileName] = htmlContent;

        const fragment = document.createDocumentFragment();
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        
        // Execute scripts in the loaded HTML
        const scripts = tempDiv.querySelectorAll('script');
        scripts.forEach(script => {
          if (script.textContent) {
            try {
              eval(script.textContent);
              console.log('✅ Script executed successfully from server');
            } catch (e) {
              console.error('❌ Error executing script from server:', e);
            }
          }
        });
        
        while (tempDiv.firstChild) {
          fragment.appendChild(tempDiv.firstChild);
        }
        
        menuContainer.innerHTML = '';
        menuContainer.appendChild(fragment);
        
        // Render lecturer menu dựa vào position
        if (normalizedRole === 'LECTURER' && window.currentUserData) {
          setTimeout(() => {
            const position = (window.currentUserData.position || 'default').toString().toLowerCase();
            console.log('🔍 Checking LecturerPositionMenu availability from server:', typeof window.LecturerPositionMenu, 'position:', position);
            if (typeof window.LecturerPositionMenu !== 'undefined') {
              renderLecturerMenu(position);
            } else {
              console.error('❌ LecturerPositionMenu is not defined from server load');
            }
          }, 100);
        }
      })
      .withFailureHandler(function(error) {
        menuContainer.innerHTML = '<div style="color: #e74c3c; text-align: center; padding: 20px;">Lỗi kết nối máy chủ!</div>';
      })
      .api_loadView(fileName);
  }
</script>
