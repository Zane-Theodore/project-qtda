<script>

  function initStudentProfile() {
    const currentAccountId = window.currentUserData.id;

    google.script.run
      .withSuccessHandler(function(responseString) {
        const response = JSON.parse(responseString);

        if (response.success) {
          const data = response.data;

          document.getElementById('lbl-fullname').textContent = data.fullName;
          document.getElementById('lbl-student-code').textContent = data.studentId;
          document.getElementById('lbl-email').textContent = data.email;
          document.getElementById('lbl-phone').textContent = data.number;
          document.getElementById('lbl-national-id').textContent = data.nationalId;
          document.getElementById('lbl-address').textContent = data.address;
          
          document.getElementById('lbl-class').textContent = data.classId;
          document.getElementById('lbl-major').textContent = data.major;
          document.getElementById('lbl-cohort').textContent = data.cohort;
          document.getElementById('lbl-program').textContent = data.programType;

          document.getElementById('profile-loading').style.display = 'none';
          document.getElementById('profile-content').style.display = 'block';
        } else {
          alert("Lỗi tải hồ sơ: " + response.error);
          document.getElementById('profile-loading').innerHTML = '<span style="color: red;">Lỗi tải dữ liệu.</span>';
        }
      })
      .withFailureHandler(function(error) {
        alert("Lỗi kết nối máy chủ!");
      })
      .api_st_getStudentByAccountId(currentAccountId);
  };
</script>
