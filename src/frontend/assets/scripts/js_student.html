<script>
  window.DataCache = window.DataCache || {};

  /**
   * Khởi tạo và hiển thị hồ sơ sinh viên
   * Tự động gọi từ Router, lấy dữ liệu hồ sơ từ backend và cập nhật UI
   */
  window.initStudentProfile = function() {
    const currentAccountId = window.currentUserData.id;
    const cacheKey = 'profile_data_' + currentAccountId;

    showProfileLoading();

    /**
     * Cập nhật giao diện với dữ liệu hồ sơ sinh viên
     * @param {Object} data - Dữ liệu hồ sơ từ backend
     */
    const renderProfile = (data) => {
      updateAvatarFromName(data.fullName, 'profile-avatar-text');

      safeSetText('lbl-fullname', formatValue(data.fullName));
      safeSetText('lbl-student-code', formatValue(data.studentId));
      safeSetText('lbl-dob', formatDate(data.dob));
      safeSetText('lbl-email', formatValue(data.email));
      safeSetText('lbl-phone', formatValue(data.number));
      safeSetText('lbl-national-id', formatValue(data.nationalId));
      safeSetText('lbl-address', formatValue(data.address));

      safeSetText('lbl-enrollment-date', formatDate(data.enrollmentDate));
      safeSetText('lbl-class', formatValue(data.classId));
      safeSetText('lbl-major', formatValue(data.major));
      safeSetText('lbl-cohort', formatValue(data.cohort));
      safeSetText('lbl-program', formatValue(data.programType));

      let gpaText = formatValue(data.gpa);
      if (gpaText !== "--" && !isNaN(gpaText)) {
        gpaText = parseFloat(gpaText).toFixed(2);
      }
      safeSetText('lbl-gpa', gpaText);

      safeSetText('lbl-practicum-company', formatValue(data.practicumCompany));
      safeSetText('lbl-practicum-score', formatValue(data.practicumScore));
      safeSetText('lbl-internship-company', formatValue(data.internshipCompany));
      safeSetText('lbl-internship-score', formatValue(data.internshipScore));

      hideProfileLoading();
    };

    if (window.DataCache[cacheKey]) {
      renderProfile(window.DataCache[cacheKey]);
    } else {
      google.script.run
        .withSuccessHandler(function(responseString) {
          const response = JSON.parse(responseString);
          if (response.success) {
            window.DataCache[cacheKey] = response.data;
            renderProfile(response.data);
          } else {
            const errorMsg = response.error || 'Không thể tải hồ sơ';
            alert("Lỗi tải hồ sơ: " + errorMsg);
            handleProfileLoadError(errorMsg);
          }
        })
        .withFailureHandler(function(error) {
          alert("Lỗi kết nối máy chủ! Vui lòng kiểm tra lại mạng.");
          handleProfileLoadError('Lỗi kết nối máy chủ');
        })
        .api_st_getStudentByAccountId(currentAccountId);
    }
  };

  // ----- THESIS PROGRESS JS -----
  window.initThesisProgress = function() {
      window.ThesisState = {
          selectedFile: null,
          base64String: null,
          currentOpenMilestoneId: null
      };

      if (typeof google !== 'undefined') {
          google.script.run
              .withSuccessHandler(function(resStr) {
                  try {
                      const response = JSON.parse(resStr);
                      if (response.success) {
                          window.renderMilestones(response.data);
                      } else {
                          alert("Lỗi tải dữ liệu: " + response.error);
                      }
                  } catch(e) { console.error("Parse Error:", e); }
              })
              .api_st_getStudentProgress(window.currentUserData.id);
      }
  };

  window.renderMilestones = function(data) {
      document.getElementById('ui-progress-fill').style.width = data.progressPercent + '%';
      document.getElementById('ui-progress-text').innerText = data.progressPercent + '%';

      const container = document.getElementById('milestones-container');
      container.innerHTML = '';
      
      const now = new Date();

      data.milestones.forEach(function(item) {
          const isCompleted = item.status === "COMPLETED";
          const deadlineDate = new Date(item.deadline + "T23:59:59");
          const isOverdue = !isCompleted && now > deadlineDate;

          let iconClass = "pending";
          let iconName = "assignment";
          
          if (isCompleted) {
              iconClass = "completed";
              iconName = "check";
          } else if (item.id === "CuoiKy") {
              iconClass = "final";
              iconName = "description";
          } else {
              iconClass = "pending";
              iconName = "assignment_time";
          }

          let formatDl = item.deadline.split("-").reverse().join("/");

          let cardHTML = `
          <div class="milestone-card">
              <div class="status-icon ${iconClass}">
                  <span class="material-symbols-outlined" style="${isCompleted ? 'font-size: 28px;' : ''}">${iconName}</span>
              </div>
              <div class="milestone-content">
                  <div class="milestone-header">
                      <div class="milestone-title-group">
                          <h4>${item.title}</h4>
                          <div class="milestone-deadline ${isOverdue ? 'deadline-error' : ''}">
                              Thời hạn: ${formatDl} ${isOverdue ? '(Đã quá hạn)' : ''}
                          </div>
                          ${!isCompleted && item.description ? `<div class="milestone-desc">${item.description}</div>` : ''}
                      </div>
                      <div style="display: flex; gap: 15px; align-items: center; margin-top: 5px;">
                      ${isCompleted 
                          ? `<div class="status-label completed">ĐÃ HOÀN THÀNH</div>`
                          : `<div class="status-label pending">CHỜ NỘP</div>
                             <button class="btn-action ${isOverdue ? 'btn-disabled' : ''}" 
                                     onclick="window.openProgressModal('${item.id}')"
                                     ${isOverdue ? 'disabled' : ''}>
                                <span class="material-symbols-outlined" style="font-size: 18px;">cloud_upload</span> 
                                ${item.id === "CuoiKy" ? 'Nộp bài KLTN' : 'Thêm bài nộp'}
                             </button>`
                      }
                      </div>
                  </div>
                  ${isCompleted ? `
                      <div class="feedback-box">
                          <div class="feedback-label">NHẬN XÉT CỦA GIẢNG VIÊN</div>
                          <div class="feedback-text">${item.feedback ? item.feedback : '<i>(Giảng viên đang nhận xét các bài báo cáo khóa luận tốt nghiệp...)</i>'}</div>
                      </div>
                  ` : ''}
                  ${isOverdue ? `
                     <div style="color: #ef4444; font-size: 13px; margin-top: 10px; font-weight: 500;">
                       Hệ thống đã tự động đóng cổng nộp bài.
                     </div>
                  `: ''}
              </div>
          </div>`;

          container.innerHTML += cardHTML;
      });

      setTimeout(window.bindModalEvents, 100);
  };

  window.bindModalEvents = function() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');

      if (!dropZone || dropZone.dataset.bound) return;
      dropZone.dataset.bound = "true";

      dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', function(e) { e.preventDefault(); dropZone.classList.remove('dragover'); });
      dropZone.addEventListener('drop', function(e) {
          e.preventDefault(); 
          dropZone.classList.remove('dragover');
          if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
              window.handleFileSelection(e.dataTransfer.files[0]);
          }
      });

      dropZone.addEventListener('click', function() { fileInput.click(); });
      fileInput.addEventListener('change', function(e) {
          if (e.target.files.length > 0) {
              window.handleFileSelection(e.target.files[0]);
          }
      });
  };

  window.openProgressModal = function(milestoneId) {
      window.ThesisState.currentOpenMilestoneId = milestoneId;
      document.getElementById('uploadModal').style.display = 'flex';
      window.resetProgressForm();
  };

  window.closeProgressModal = function() {
      document.getElementById('uploadModal').style.display = 'none';
      window.ThesisState.currentOpenMilestoneId = null;
      window.resetProgressForm();
  };

  window.resetProgressForm = function() {
      window.ThesisState.selectedFile = null;
      window.ThesisState.base64String = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('fileNameDisplay').style.display = 'none';
      document.getElementById('dropZone').style.display = 'block';
      
      const btnUpload = document.getElementById('btnUpload');
      btnUpload.innerText = 'Đăng tải';
      btnUpload.disabled = false;
      btnUpload.style.opacity = '1';
  };

  window.handleFileSelection = function(file) {
      if (file.type !== 'application/pdf') {
          alert('Lỗi: Hệ thống chỉ hỗ trợ duyệt tệp tin .PDF !');
          return;
      }
      window.ThesisState.selectedFile = file;
      document.getElementById('fNameText').innerText = file.name;
      document.getElementById('dropZone').style.display = 'none'; 
      document.getElementById('fileNameDisplay').style.display = 'flex'; 

      const reader = new FileReader();
      reader.onload = function(event) {
          window.ThesisState.base64String = event.target.result;
      };
      reader.readAsDataURL(file);
  };

  window.doProgressUpload = function() {
      const state = window.ThesisState;
      if (!state.selectedFile || !state.base64String) {
          alert('Trạng thái treo: Vui lòng kéo thả hoặc click chọn thư mục tải tệp .pdf');
          return;
      }

      const btnUpload = document.getElementById('btnUpload');
      btnUpload.innerText = 'Đang đẩy lên máy chủ...';
      btnUpload.style.opacity = '0.7';
      btnUpload.disabled = true;

      google.script.run
          .withSuccessHandler(function(responseStr) {
              try {
                  const response = JSON.parse(responseStr);
                  if (response.success) {
                      alert(response.message);
                      window.closeProgressModal();
                      window.initThesisProgress();
                  } else {
                      alert("Lỗi tải lên: " + response.error);
                      btnUpload.innerText = 'Đăng tải';
                      btnUpload.disabled = false;
                      btnUpload.style.opacity = '1';
                  }
              } catch(err) {
                  alert('Lỗi parse phản hồi hệ thống!');
                  window.closeProgressModal();
              }
          })
          .withFailureHandler(function(error) {
              alert("Lỗi kết nối Server: " + error.message);
              btnUpload.innerText = 'Đăng tải';
              btnUpload.disabled = false;
              btnUpload.style.opacity = '1';
          })
          .uploadFileToDrive(state.base64String, state.selectedFile.name);
  };
</script>
