<script>
  window.initNotification = function () {
    var accountId = window.currentUserData && window.currentUserData.id;

    var loadingEl = document.getElementById('notification-loading');
    var contentEl = document.getElementById('notification-content');

    if (loadingEl) loadingEl.style.display = 'flex';
    if (contentEl) contentEl.style.display = 'none';

    google.script.run
      .withSuccessHandler(function (responseString) {
        var response = JSON.parse(responseString);

        if (!response.success) {
          renderNotificationError(response.error || 'Không tải được thông báo');
          return;
        }

        renderNotificationList(response.data || []);

        if (loadingEl) loadingEl.style.display = 'none';
        if (contentEl) contentEl.style.display = 'block';

        switchNotificationTab('general'); // Mặc định mở tab Chung
      })
      .withFailureHandler(function (error) {
        renderNotificationError(error && error.message ? error.message : 'Lỗi kết nối máy chủ');
      })
      .api_co_getMyNotifications(accountId);
  };

  window.switchNotificationTab = function (tabName) {
    var tabGen = document.getElementById('tab-notif-general');
    var tabPers = document.getElementById('tab-notif-personal');
    var listGen = document.getElementById('notification-list-general');
    var listPers = document.getElementById('notification-list-personal');

    if (tabName === 'general') {
      if (tabGen) tabGen.classList.add('active');
      if (tabPers) tabPers.classList.remove('active');
      if (listGen) listGen.style.display = 'flex';
      if (listPers) listPers.style.display = 'none';
    } else {
      if (tabGen) tabGen.classList.remove('active');
      if (tabPers) tabPers.classList.add('active');
      if (listGen) listGen.style.display = 'none';
      if (listPers) listPers.style.display = 'flex';
    }
  };

  function renderNotificationList(list) {
    var containerGen = document.getElementById('notification-list-general');
    if (!containerGen) return;

    function renderItems(items, container) {
      if (!items || items.length === 0) {
        container.innerHTML = '<div class="notification-empty">Không có thông báo nào.</div>';
        return;
      }
      container.innerHTML = items.map(function (item) {
        var isRead = normalizeReadState(item.isRead);
        var cardClass = isRead ? 'read' : 'unread';

        return ''
          + '<div class="notification-card ' + cardClass + '" onclick="handleNotificationClick(\'' + escapeAttr(item.id) + '\', this)">'
          + '  <div class="notification-card__title-row">'
          + '    <span class="notification-card__dot"></span>'
          + '    <h3 class="notification-card__title">' + escapeHtml(item.title || '') + '</h3>'
          + '  </div>'
          + '  <div class="notification-card__meta">'
          + '    <span class="notification-card__meta-item">'
          + '      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c2.761 0 5-2.239 5-5S14.761 2 12 2 7 4.239 7 7s2.239 5 5 5zm0 2c-3.866 0-7 3.134-7 7h2a5 5 0 0 1 10 0h2c0-3.866-3.134-7-7-7z"/></svg>'
          + '      <span>' + escapeHtml(item.senderDisplay || item.senderId || '--') + '</span>'
          + '    </span>'
          + '    <span class="notification-card__meta-item">'
          + '      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 15H5V10h14v9zm0-11H5V6h14v2z"/></svg>'
          + '      <span>' + escapeHtml(formatDisplayDate(item.createdAt)) + '</span>'
          + '    </span>'
          + '  </div>'
          + '  <p class="notification-card__content">' + escapeHtml(item.content || '') + '</p>'
          + '</div>';
      }).join('');
    }

    // Gộp tất cả thông báo vào chung một tab
    renderItems(list, containerGen);
  }

  function handleNotificationClick(notificationId, cardEl) {
    if (!notificationId || !cardEl) return;

    // Lấy title từ card
    var titleEl = cardEl.querySelector('.notification-card__title');
    var title = titleEl ? titleEl.textContent : '';

    // Đánh dấu đã đọc
    if (!cardEl.classList.contains('read')) {
      cardEl.classList.remove('unread');
      cardEl.classList.add('read');

      google.script.run
        .withSuccessHandler(function (responseString) {
          var response = JSON.parse(responseString);
          if (!response.success) {
            cardEl.classList.remove('read');
            cardEl.classList.add('unread');
          }
        })
        .withFailureHandler(function () {
          cardEl.classList.remove('read');
          cardEl.classList.add('unread');
        })
        .api_co_markNotificationAsRead(notificationId);
    }

    // Nếu title chứa "Duyệt biên bản" -> mở popup BBHĐ
    if (title.toLowerCase().indexOf('duyệt biên bản') > -1) {
      openBBHDPopup(notificationId);
    }
  }

  // ====== BBHĐ POPUP LOGIC ======

  // Mở popup và load dữ liệu
  window.openBBHDPopup = function (notificationId) {
    var overlay = document.getElementById('bbhd-overlay');
    var tbody = document.getElementById('bbhd-table-body');
    var emptyEl = document.getElementById('bbhd-empty');

    if (!overlay) return;
    overlay.style.display = 'flex';
    if (tbody) tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#94a3b8">Đang tải dữ liệu...</td></tr>';
    if (emptyEl) emptyEl.style.display = 'none';

    // Gọi API lấy danh sách BBHĐ
    google.script.run
      .withSuccessHandler(function (responseString) {
        var response = JSON.parse(responseString);
        if (response.success && response.data && response.data.length > 0) {
          window._bbhdData = response.data;
          renderBBHDTable(response.data);
        } else {
          if (tbody) tbody.innerHTML = '';
          if (emptyEl) emptyEl.style.display = 'block';
        }
      })
      .withFailureHandler(function (error) {
        if (tbody) tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#ef4444">Lỗi tải dữ liệu: ' + (error && error.message || '') + '</td></tr>';
      })
      .api_co_getBBHDRecords(notificationId);
  };

  // Đóng popup
  window.closeBBHDPopup = function () {
    var overlay = document.getElementById('bbhd-overlay');
    if (overlay) overlay.style.display = 'none';
  };

  // Render bảng BBHĐ
  function renderBBHDTable(records) {
    var tbody = document.getElementById('bbhd-table-body');
    var emptyEl = document.getElementById('bbhd-empty');
    if (!tbody) return;

    if (!records || records.length === 0) {
      tbody.innerHTML = '';
      if (emptyEl) emptyEl.style.display = 'block';
      return;
    }

    if (emptyEl) emptyEl.style.display = 'none';

    tbody.innerHTML = records.map(function (item, index) {
      var stt = String(index + 1).padStart(2, '0');
      var statusClass = getStatusClass(item.status);

      // File link
      var fileHtml = '';
      if (item.fileLink) {
        var fileName = item.fileName || 'Bien_ban.pdf';
        fileHtml = '<a class="bbhd-file-link" href="' + escapeAttr(item.fileLink) + '" target="_blank" title="' + escapeAttr(fileName) + '">'
          + '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>'
          + escapeHtml(fileName)
          + '</a>';
      } else {
        fileHtml = '<span class="bbhd-file-none">Chưa có file</span>';
      }

      // Status select
      var statusHtml = '<select class="bbhd-status-select ' + statusClass + '" '
        + 'data-record-id="' + escapeAttr(item.id) + '" '
        + 'onchange="updateBBHDStatus(this)">'
        + '<option value="Chờ duyệt"' + (item.status === 'Chờ duyệt' ? ' selected' : '') + '>CHỜ DUYỆT</option>'
        + '<option value="Đã đồng ý"' + (item.status === 'Đã đồng ý' ? ' selected' : '') + '>ĐÃ ĐỒNG Ý</option>'
        + '<option value="Từ chối"' + (item.status === 'Từ chối' ? ' selected' : '') + '>TỪ CHỐI</option>'
        + '</select>';

      // Action buttons: eye (xem) + download (tải)
      var viewBtn = '<button class="bbhd-action-btn" title="Xem chi tiết" onclick="viewBBHDDetail(\'' + escapeAttr(item.id) + '\')">'
        + '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>'
        + '</button>';

      var downloadBtn = '';
      if (item.fileLink) {
        downloadBtn = '<button class="bbhd-action-btn" title="Tải xuống" onclick="downloadBBHDFile(\'' + escapeAttr(item.fileLink) + '\', \'' + escapeAttr(item.fileName || 'Bien_ban.pdf') + '\')">'
          + '<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>'
          + '</button>';
      }

      return '<tr>'
        + '<td class="bbhd-stt">' + stt + '</td>'
        + '<td><span class="bbhd-topic-title">' + escapeHtml(item.topicTitle || '') + '</span></td>'
        + '<td><span class="bbhd-student-name">' + escapeHtml(item.studentName || '') + '</span>'
        + '<span class="bbhd-student-mssv">MSSV: ' + escapeHtml(item.studentId || '') + '</span></td>'
        + '<td>' + fileHtml + '</td>'
        + '<td>' + statusHtml + '</td>'
        + '<td><div class="bbhd-actions">' + viewBtn + downloadBtn + '</div></td>'
        + '</tr>';
    }).join('');
  }

  // Map trạng thái sang CSS class
  function getStatusClass(status) {
    var s = String(status || '').trim();
    if (s === 'Đã đồng ý') return 'status-dong-y';
    if (s === 'Từ chối') return 'status-tu-choi';
    return 'status-cho-duyet';
  }

  // Cập nhật trạng thái 1 biên bản
  window.updateBBHDStatus = function (selectEl) {
    var recordId = selectEl.getAttribute('data-record-id');
    var newStatus = selectEl.value;

    // Cập nhật UI class
    selectEl.className = 'bbhd-status-select ' + getStatusClass(newStatus);

    // Gọi API cập nhật DB
    google.script.run
      .withSuccessHandler(function (responseString) {
        var response = JSON.parse(responseString);
        if (response.success) {
          showNotification('Đã cập nhật trạng thái thành công!', 'success');
        } else {
          showNotification('Lỗi: ' + (response.error || 'Không xác định'), 'error');
        }
      })
      .withFailureHandler(function (error) {
        showNotification('Lỗi kết nối: ' + (error && error.message || ''), 'error');
      })
      .api_co_updateBBHDStatus(recordId, newStatus);
  };

  // Duyệt tất cả (chỉ những mục "Chờ duyệt")
  window.approveAllBBHD = function () {
    var selects = document.querySelectorAll('.bbhd-status-select');
    var pendingIds = [];

    selects.forEach(function (sel) {
      if (sel.value === 'Chờ duyệt') {
        pendingIds.push(sel.getAttribute('data-record-id'));
        sel.value = 'Đã đồng ý';
        sel.className = 'bbhd-status-select status-dong-y';
      }
    });

    if (pendingIds.length === 0) {
      showNotification('Không có mục nào đang chờ duyệt', 'info');
      return;
    }

    // Gọi API duyệt hàng loạt
    google.script.run
      .withSuccessHandler(function (responseString) {
        var response = JSON.parse(responseString);
        if (response.success) {
          showNotification('Đã duyệt tất cả ' + pendingIds.length + ' biên bản thành công!', 'success');
        } else {
          showNotification('Lỗi: ' + (response.error || 'Không xác định'), 'error');
        }
      })
      .withFailureHandler(function (error) {
        showNotification('Lỗi kết nối: ' + (error && error.message || ''), 'error');
      })
      .api_co_approveAllBBHD(JSON.stringify(pendingIds));
  };

  // Xem chi tiết biên bản
  window.viewBBHDDetail = function (recordId) {
    // Tìm item từ dữ liệu đã cache
    var data = window._bbhdData || [];
    var item = null;
    for (var i = 0; i < data.length; i++) {
      if (String(data[i].id) === String(recordId)) {
        item = data[i];
        break;
      }
    }

    if (item && item.fileLink) {
      window.open(item.fileLink, '_blank');
    } else {
      showNotification('Chưa có file biên bản để xem', 'info');
    }
  };

  // Tải xuống biên bản
  window.downloadBBHDFile = function (fileLink, fileName) {
    if (!fileLink) {
      showNotification('Chưa có file để tải xuống', 'info');
      return;
    }
    var a = document.createElement('a');
    a.href = fileLink;
    a.target = '_blank';
    a.download = fileName || 'Bien_ban.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  function renderNotificationError(message) {
    var loadingEl = document.getElementById('notification-loading');
    var contentEl = document.getElementById('notification-content');
    var containerGen = document.getElementById('notification-list-general');

    if (loadingEl) loadingEl.style.display = 'none';
    if (contentEl) contentEl.style.display = 'block';

    if (containerGen) containerGen.innerHTML = '<div class="notification-empty">Lỗi: ' + escapeHtml(message || 'Không xác định') + '</div>';
  }

  function normalizeReadState(value) {
    if (value === true) return true;
    if (value === false) return false;
    return String(value || '').trim().toUpperCase() === 'TRUE';
  }

  function formatDisplayDate(dateStr) {
    if (!dateStr) return '';

    var str = String(dateStr).trim();
    var parts = str.split('/');

    if (parts.length === 3) {
      return parts[0] + '/' + parts[1] + '/' + parts[2];
    }

    var d = new Date(str);
    if (!isNaN(d.getTime())) {
      return d.toLocaleDateString('vi-VN');
    }

    return str;
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttr(value) {
    return String(value == null ? '' : value)
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'");
  }
</script>
