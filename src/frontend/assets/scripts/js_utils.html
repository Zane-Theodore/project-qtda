<script>
  /**
   * ==========================================
   * MODULE: TIỆN ÍCH DÙNG CHUNG (UTILITIES)
   * ==========================================
   */

   
  /** Hiển thị thông báo toast **/
  function showNotification(message, type) {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      document.body.appendChild(container);
    }

    const activeToasts = Array.from(container.children).filter(t => !t.classList.contains('toast-exit'));

    if (activeToasts.length >= 3) {
      const oldestToast = activeToasts[0];
      
      oldestToast.classList.add('toast-exit');
      
      setTimeout(() => {
        if (container.contains(oldestToast)) {
          oldestToast.remove();
        }
      }, 400); 
    }

    const alertBox = document.createElement('div');
    alertBox.className = 'toast-notification';
    alertBox.innerText = message;
    
    if (type === 'success') {
      alertBox.style.backgroundColor = '#d4edda'; 
      alertBox.style.color = '#155724';
      alertBox.style.borderLeft = '6px solid #28a745'; 
    } else if (type === 'error') {
      alertBox.style.backgroundColor = '#f8d7da'; 
      alertBox.style.color = '#721c24';
      alertBox.style.borderLeft = '6px solid #dc3545';
    } else {
      alertBox.style.backgroundColor = '#fff3cd'; 
      alertBox.style.color = '#856404';
      alertBox.style.borderLeft = '6px solid #ffc107';
    }
    
    container.appendChild(alertBox);
    
    setTimeout(() => { 
      if (container.contains(alertBox) && !alertBox.classList.contains('toast-exit')) {
        alertBox.classList.add('toast-exit');
        setTimeout(() => {
          if (container.contains(alertBox)) alertBox.remove();
        }, 400);
      }
    }, 3000);
  }

  /**
   * ==========================================
   * MODULE: HỖ TRỢ PROFILE (PROFILE UTILITIES)
   * ==========================================
   */

  /**
   * Định dạng giá trị dữ liệu, thay thế null/undefined/chuỗi rỗng bằng "--"
   * @param {any} value - Giá trị cần định dạng
   * @returns {string} Giá trị định dạng hoặc "--" nếu trống
   */
  function formatValue(value) {
    return (value === undefined || value === null || value === '') ? "--" : value;
  }

  /**
   * Chuyển đổi chuỗi ngày thành định dạng vi-VN (dd/mm/yyyy)
   * @param {string} dateStr - Chuỗi ngày cần chuyển đổi
   * @returns {string} Ngày định dạng hoặc "--" nếu không hợp lệ
   */
  function formatDate(dateStr) {
    if (!dateStr) return "--";
    try {
      const date = new Date(dateStr);
      return isNaN(date.getTime()) ? dateStr : date.toLocaleDateString('vi-VN');
    } catch (error) {
      return dateStr;
    }
  }

  /**
   * An toàn gán text cho phần tử DOM bằng ID
   * @param {string} elementId - ID của phần tử DOM
   * @param {any} text - Nội dung cần gán
   */
  function safeSetText(elementId, text) {
    const element = document.getElementById(elementId);
    if (element) {
      element.textContent = text;
    }
  }

  /**
   * Cập nhật avatar từ chữ cái đầu tiên của tên
   * @param {string} fullName - Tên đầy đủ
   * @param {string} avatarElementId - ID của phần tử avatar
   */
  function updateAvatarFromName(fullName, avatarElementId = 'profile-avatar-text') {
    if (fullName) {
      const nameParts = fullName.trim().split(' ');
      const firstName = nameParts[nameParts.length - 1];
      const avatarEl = document.getElementById(avatarElementId);
      if (avatarEl) {
        avatarEl.innerHTML = '';
        avatarEl.textContent = firstName.charAt(0).toUpperCase();
      }
    }
  }

  /**
   * Cập nhật avatar từ dữ liệu người dùng hiện tại (window.currentUserData)
   * Helper function để tiện cập nhật avatar header
   * @param {string} avatarElementId - ID của phần tử avatar (mặc định: 'profile-avatar-text')
   */
  function updateHeaderAvatar(avatarElementId = 'profile-avatar-text') {
    if (window.currentUserData && window.currentUserData.fullName) {
      updateAvatarFromName(window.currentUserData.fullName, avatarElementId);
    }
  }

  /**
   * Hiện loading, ẩn nội dung
   * @param {string} loadingId - ID phần tử loading
   * @param {string} contentId - ID phần tử nội dung
   */
  function showProfileLoading(loadingId = 'profile-loading', contentId = 'profile-content') {
    const loadingEl = document.getElementById(loadingId);
    const contentEl = document.getElementById(contentId);
    if (loadingEl) loadingEl.style.display = 'flex';
    if (contentEl) contentEl.style.display = 'none';
  }

  /**
   * Ẩn loading, hiện nội dung
   * @param {string} loadingId - ID phần tử loading
   * @param {string} contentId - ID phần tử nội dung
   */
  function hideProfileLoading(loadingId = 'profile-loading', contentId = 'profile-content') {
    const loadingEl = document.getElementById(loadingId);
    const contentEl = document.getElementById(contentId);
    if (loadingEl) loadingEl.style.display = 'none';
    if (contentEl) contentEl.style.display = 'block';
  }

  /**
   * Xử lý lỗi tải hồ sơ
   * @param {string} errorMessage - Thông báo lỗi
   * @param {string} loadingId - ID phần tử loading
   */
  function handleProfileLoadError(errorMessage, loadingId = 'profile-loading') {
    const loadingEl = document.getElementById(loadingId);
    if (loadingEl) {
      loadingEl.innerHTML = '<span style="color: #e74c3c;">Lỗi: ' + errorMessage + '</span>';
    }
  }

  /**
   * Tạo danh sách HTML từ mảng
   * @param {Array} items - Mảng đối tượng
   * @param {Function} templateFn - Hàm tạo template cho mỗi item
   * @param {string} emptyMessage - Thông báo khi danh sách trống
   * @returns {string} HTML string
   */
  function renderList(items, templateFn, emptyMessage = 'Chưa có dữ liệu') {
    if (!items || items.length === 0) {
      return `<div style="color: #94a3b8; padding: 10px;">${emptyMessage}</div>`;
    }
    return items.map(templateFn).join('');
  }

  /**
 * Đóng/Mở Dropdown menu ở Avatar
 */
function toggleUserDropdown(event) {
  // Ngăn chặn sự kiện click lan ra ngoài body (nếu không nó sẽ kích hoạt luôn sự kiện đóng bên dưới)
  if (event) event.stopPropagation(); 
  
  const dropdown = document.getElementById('userDropdown');
  if (dropdown) {
    dropdown.classList.toggle('hidden');
  }
}

/**
 * Lắng nghe sự kiện click trên toàn màn hình để đóng Dropdown nếu người dùng click ra ngoài
 */
window.addEventListener('click', function(event) {
  const dropdown = document.getElementById('userDropdown');
  const avatarBtn = document.getElementById('userAvatarBtn');
  
  if (dropdown && !dropdown.classList.contains('hidden')) {
    // Nếu click chuột KHÔNG nằm trong dropdown VÀ KHÔNG nằm trong avatar
    if (!dropdown.contains(event.target) && !avatarBtn.contains(event.target)) {
      dropdown.classList.add('hidden'); // Ẩn nó đi
    }
  }
});
</script>
