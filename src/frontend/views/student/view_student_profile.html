<div style="padding: 20px; max-width: 800px; margin: 0 auto;">
  <h2 style="color: #2F5597; margin-bottom: 20px; border-bottom: 2px solid #bdc3c7; padding-bottom: 10px;">
    Hồ sơ Sinh viên
  </h2>

  <div id="profile-loading" style="text-align: center; padding: 40px;">
    <div class="spinner"></div>
    <p style="color: #7f8c8d; margin-top: 15px;">Đang tải thông tin...</p>
  </div>

  <div id="profile-content" style="display: none; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
      <div>
        <h3 style="color: #27ae60; font-size: 16px; margin-bottom: 15px;">Thông tin liên hệ</h3>
        <p><strong>Họ và tên:</strong> <span id="lbl-fullname">...</span></p>
        <p><strong>MSSV:</strong> <span id="lbl-student-code" style="font-weight: bold; color: #c0392b;">...</span></p>
        <p><strong>Email:</strong> <span id="lbl-email">...</span></p>
        <p><strong>Số điện thoại:</strong> <span id="lbl-phone">...</span></p>
        <p><strong>CCCD:</strong> <span id="lbl-national-id">...</span></p>
        <p><strong>Địa chỉ:</strong> <span id="lbl-address">...</span></p>
      </div>

      <div>
        <h3 style="color: #27ae60; font-size: 16px; margin-bottom: 15px;">Thông tin học vụ</h3>
        <p><strong>Lớp sinh hoạt:</strong> <span id="lbl-class">...</span></p>
        <p><strong>Ngành học:</strong> <span id="lbl-major">...</span></p>
        <p><strong>Khóa học (Cohort):</strong> <span id="lbl-cohort">...</span></p>
        <p><strong>Hệ đào tạo:</strong> <span id="lbl-program">...</span></p>
      </div>
    </div>
  </div>
</div>
