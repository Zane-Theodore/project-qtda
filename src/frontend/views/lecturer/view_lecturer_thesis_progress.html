<!-- File: src/frontend/views/lecturer/view_lecturer_thesis_progress.html -->

<div class="lecturer-progress-page" id="app-lecturer-progress-container">
    <div class="progress-header">
        <div class="page-title-tab">Theo dõi</div>
    </div>

    <div class="progress-layout">
        <!-- CỘT TRÁI: Tổng quan + Danh sách SV -->
        <div class="progress-left-column">
            <!-- Khối tổng quan -->
            <div class="overview-card">
                <h3 class="overview-subtitle">TỔNG QUAN</h3>
                <h1 id="overview-total-theses">0 Đề tài</h1>
                <div class="overview-stats" id="overview-stats-container">
                    <!-- Javascript sẽ render tag ở đây -->
                </div>
            </div>

            <!-- Danh sách sinh viên -->
            <div class="student-list-section">
                <div class="section-header-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin: 0; color: #1e293b;">Danh sách Sinh viên</h3>
                </div>
                
                <button class="btn-outline-custom" id="btn-open-add-task">Thêm bài tập</button>

                <div class="student-list" id="student-progress-list">
                    <!-- Javascript sẽ render danh sách vào đây -->
                    <div class="loading-state">Đang tải dữ liệu...</div>
                </div>
            </div>
        </div>

        <!-- CỘT PHẢI: Panel chi tiết -->
        <div class="progress-right-column">
            <div class="detail-panel" id="student-detail-panel" style="display: none;">
                <div class="detail-panel-header" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
                    <h3 style="margin: 0; color: #1e293b; font-size: 18px;">
                        Quản lý đề tài <br>
                        <span id="detail-student-name" style="font-weight: normal; font-size: 16px; color: #0f172a;"></span>
                    </h3>
                    <button class="btn-icon" style="background: none; border: none; color: #2563eb; cursor: pointer; padding: 5px;">
                        <span class="material-symbols-outlined" style="font-size: 20px;">edit</span>
                    </button>
                </div>
                
                <div class="detail-timeline" id="detail-timeline-container">
                    <!-- Javascript sẽ render timeline chi tiết vào đây -->
                </div>
            </div>
            <div class="detail-panel-empty" id="student-detail-empty">
                <p>Chọn một sinh viên để xem chi tiết tiến độ</p>
            </div>
        </div>
    </div>
</div>

<!-- MODAL THÊM BÀI TẬP -->
<div class="modal-overlay" id="modal-add-task" style="display: none;">
    <div class="modal-content modal-md">
        <div class="modal-header">
            <h3>Thêm bài tập</h3>
            <button class="btn-close-modal" id="btn-close-add-task">&times;</button>
        </div>
        <div class="modal-body form-group-list">
            <div class="form-group">
                <label>Tiêu đề</label>
                <input type="text" id="task-title" class="form-control" placeholder="Thêm tiêu đề..." required>
            </div>
            <div class="form-group">
                <label>Mô tả</label>
                <textarea id="task-desc" class="form-control" placeholder="Thêm mô tả..." rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Danh sách sinh viên</label>
                <select id="task-student-select" class="form-control" required>
                    <!-- Options sẽ load động dựa trên list theses -->
                    <option value="">Chọn sinh viên</option>
                </select>
            </div>
            
            <!-- THÊM CHỌN LOẠI BÀI TẬP (Mới thêm theo requirement) -->
            <div class="form-group">
                <label>Loại bài tập</label>
                <select id="task-type-select" class="form-control" required>
                    <option value="TienDo1">Lần 1</option>
                    <option value="TienDo2">Lần 2</option>
                    <option value="CuoiKy">Cuối Kỳ</option>
                    <option value="Final">Báo cáo Mộc</option>
                </select>
            </div>

            <div class="form-row" style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Ngày hết hạn</label>
                    <input type="date" id="task-due-date" class="form-control" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Giờ hết hạn</label>
                    <input type="time" id="task-due-time" class="form-control" value="23:59">
                </div>
            </div>
        </div>
        <div class="modal-footer" style="justify-content: flex-end; padding-top: 15px;">
            <button class="btn-primary" id="btn-submit-task">Giao bài tập</button>
        </div>
    </div>
</div>

<!-- MODAL PHẢN HỒI -->
<div class="modal-overlay" id="modal-feedback" style="display: none;">
    <div class="modal-content modal-sm">
        <div class="modal-header">
            <h3>Phản hồi sinh viên</h3>
            <button class="btn-close-modal" id="btn-close-feedback">&times;</button>
        </div>
        <div class="modal-body form-group">
            <textarea id="feedback-content" class="form-control" placeholder="Nhập nhận xét..." rows="4"></textarea>
            <input type="hidden" id="feedback-submission-id">
        </div>
        <div class="modal-footer" style="justify-content: flex-end;">
            <button class="btn-primary" id="btn-submit-feedback">Gửi phản hồi</button>
        </div>
    </div>
</div>

<!-- MODAL DUYỆT FINAL KLTN -->
<div class="modal-overlay" id="modal-approve-final" style="display: none;">
    <div class="modal-content modal-md">
        <div class="modal-header">
            <h3>Duyệt Báo cáo KLTN</h3>
            <button class="btn-close-modal" id="btn-close-approve-final">&times;</button>
        </div>
        <div class="modal-body" style="text-align: center; padding: 30px;">
            <p>Bạn có chắc chắn duyệt Báo cáo KLTN hoàn chỉnh của sinh viên này không?</p>
            <input type="hidden" id="approve-submission-id">
        </div>
        <div class="modal-footer" style="justify-content: center; gap: 10px;">
            <button class="btn-primary-outline" id="btn-reject-final">Từ chối</button>
            <button class="btn-primary" id="btn-accept-final">Chấp nhận</button>
        </div>
    </div>
</div>
