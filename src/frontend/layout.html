<body>

  <div class="app-layout">

    <aside class="layout-sidebar">
      <?!= include('frontend/components/sidebars/sidebar'); ?>
    </aside>

    <div class="layout-right-column">
      
      <header class="layout-header">
        <?!= include('frontend/components/header'); ?>
      </header>

      <main class="layout-main">
        <div id="app-content">
          <!-- Nội dung động sẽ được load vào đây dựa trên điều hướng (Routing) -->
        </div>
      </main>

    </div>

  </div>

  <template id="preload-sidebar-student">
    <?!= api_loadView('frontend/components/sidebars/sidebar_student') ?>
  </template>

  <template id="preload-sidebar-lecturer">
    <?!= api_loadView('frontend/components/sidebars/sidebar_lecturer') ?>
  </template>

  <script>
    window.ViewCache = window.ViewCache || {};
    window.SidebarReady = {
      student: false,
      lecturer: false
    };

    requestAnimationFrame(function() {
      const studentTemplate = document.getElementById('preload-sidebar-student');
      const lecturerTemplate = document.getElementById('preload-sidebar-lecturer');
      
      if (studentTemplate) {
        window.ViewCache['frontend/components/sidebars/sidebar_student'] = studentTemplate.innerHTML;
        window.SidebarReady.student = true;
      }
      
      if (lecturerTemplate) {
        window.ViewCache['frontend/components/sidebars/sidebar_lecturer'] = lecturerTemplate.innerHTML;
        window.SidebarReady.lecturer = true;
      }
    });
  </script>
